# NextCloud Nginx Reverse Proxy Configuration
# Target: fnet1 (192.168.0.141)
#
# Serves NextCloud at https://nextcloud.home (port 443)
# HTTP port 80 redirects to HTTPS
# Proxies to NextCloud container on localhost:8081
#
# Managed by Ansible — do not edit manually

server {
    listen 80;
    listen [::]:80;
    server_name nextcloud.home nextcloud 192.168.0.141;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nextcloud.home nextcloud;

    # SSL certificate (self-signed for .home TLD)
    ssl_certificate     /etc/nginx/ssl/nextcloud.home.crt;
    ssl_certificate_key /etc/nginx/ssl/nextcloud.home.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # NextCloud headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy no-referrer always;

    # NextCloud requires these for reverse proxy
    client_max_body_size 10G;
    client_body_timeout 300s;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        # WebSocket support (NextCloud Talk, notifications)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffering settings for large uploads
        proxy_buffering off;
        proxy_request_buffering off;
    }
}