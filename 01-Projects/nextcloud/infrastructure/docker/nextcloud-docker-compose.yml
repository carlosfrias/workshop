---
# NextCloud Docker Compose Deployment
# Target: fnet1 (192.168.0.141) — 3TB primary depot node
# TI-006: NextCloud Installation
#
# Secrets are injected via ansible-playbook environment: overrides,
# NOT hardcoded here. The playbook deploy-nextcloud.yml sets them at runtime.

services:
  nextcloud-app:
    image: nextcloud:latest
    container_name: nextcloud-app
    restart: unless-stopped
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    ports:
      - "8081:80"
    volumes:
      - nextcloud_data:/var/www/html
      - /srv/nextcloud/data:/srv/nextcloud/data
      - /srv/archive/dropbox:/srv/archive/dropbox:shared
    environment:
      - NEXTCLOUD_URL=nextcloud.home
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - REDIS_HOST=nextcloud-redis
    networks:
      - nextcloud-net

  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db
    restart: unless-stopped
    volumes:
      - /srv/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
    networks:
      - nextcloud-net

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    networks:
      - nextcloud-net

  nextcloud-cron:
    image: nextcloud:latest
    container_name: nextcloud-cron
    restart: unless-stopped
    depends_on:
      - nextcloud-app
    volumes:
      - nextcloud_data:/var/www/html
    entrypoint: /cron.sh
    networks:
      - nextcloud-net

  collabora:
    image: collabora/code:latest
    container_name: collabora
    hostname: collabora
    restart: unless-stopped
    depends_on:
      - nextcloud-app
    ports:
      - "127.0.0.1:9980:9980"
    environment:
      - aliasgroup1=https://nextcloud\.home:443
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
      - dictionaries=en_US en_GB es
      - username=${COLLABORA_ADMIN_USER:-admin}
      - password=${COLLABORA_ADMIN_PASSWORD}
      - server_name=collabora.home
    cap_add:
      - MKNOD
    networks:
      - nextcloud-net

volumes:
  nextcloud_data:

networks:
  nextcloud-net:
    driver: bridge