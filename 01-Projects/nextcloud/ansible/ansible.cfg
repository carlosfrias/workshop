[defaults]
roles_path = ./roles
inventory = ./inventory.ini
host_key_checking = False
retry_files_enabled = False

# Vault password via env: export ANSIBLE_VAULT_PASSWORD_FILE=~/.ansible/secure/.vault_pass
# If env var not set, fall back to file
vault_password_file = /Users/friasc/.ansible/secure/.vault_pass

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r