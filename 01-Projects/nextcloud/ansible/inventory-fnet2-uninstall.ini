# NextCloud Cleanup Inventory — fnet2 only
# Used by uninstall-nextcloud.yml to remove NextCloud from fnet2
# after migration to fnet1

[nextcloud_cleanup]
fnet2 ansible_host=192.168.0.142 ansible_user=friasc ansible_become=true ansible_become_method=sudo

[nextcloud_cleanup:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o ConnectTimeout=5