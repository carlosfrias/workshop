# NextCloud Ansible Inventory
# fnet1 is the 3TB primary depot node — NextCloud lives here for storage capacity
#
# Previously on fnet2, migrated to fnet1 for:
#   - 2.4TB /srv/archive + 176GB /srv available
#   - fnet2 only had 38GB free (insufficient for growing cloud storage)
#   - fnet1 is also the primary model depot (colocation reduces network hops)
#
# playbook-executor trigger: "deploy nextcloud" or "uninstall nextcloud"

[nextcloud]
fnet1 ansible_host=192.168.0.141 ansible_user=friasc ansible_become=true ansible_become_method=sudo

[lab:children]
nextcloud

[lab:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o ConnectTimeout=5