# Orchestration Schedules
# Background task scheduling for playbook execution and wiki updates

schedules:
  # Daily tasks (run during low-usage hours: 2:00-5:00 AM)
  - name: "Daily playbook documentation update"
    schedule: "0 3 * * *"
    script: "scripts/update-playbook-wiki.sh"
    priority: low
    background: true
    resource_limits:
      cpu: 25%
      memory: 500MB
      
  - name: "Daily log cleanup"
    schedule: "0 4 * * *"
    script: "scripts/cleanup-logs.sh"
    priority: low
    background: true
    resource_limits:
      cpu: 20%
      memory: 300MB
      
  - name: "Daily performance metrics aggregation"
    schedule: "30 4 * * *"
    script: "scripts/aggregate-metrics.py"
    priority: low
    background: true
    resource_limits:
      cpu: 30%
      memory: 600MB

  # Hourly tasks (run during moderate-usage periods)
  - name: "Hourly status refresh"
    schedule: "0 * * * *"
    script: "scripts/refresh-status.py"
    priority: medium
    background: true
    resource_limits:
      cpu: 15%
      memory: 400MB
      
  - name: "Hourly queue check"
    schedule: "15 * * * *"
    script: "scripts/check-queue.py"
    priority: medium
    background: true
    resource_limits:
      cpu: 10%
      memory: 200MB

  # Weekly tasks (run on weekends or Sunday night)
  - name: "Weekly performance report"
    schedule: "0 0 * * 0"
    script: "scripts/generate-weekly-report.py"
    priority: low
    background: true
    resource_limits:
      cpu: 40%
      memory: 800MB
      
  - name: "Weekly wiki sync"
    schedule: "0 1 * * 0"
    script: "scripts/sync-wiki.sh"
    priority: low
    background: true
    resource_limits:
      cpu: 25%
      memory: 500MB
      
  - name: "Weekly backlog pruning"
    schedule: "0 2 * * 0"
    script: "scripts/prune-backlog.py"
    priority: low
    background: true
    resource_limits:
      cpu: 20%
      memory: 400MB

  # Monthly tasks
  - name: "Monthly cost analysis"
    schedule: "0 3 1 * *"
    script: "scripts/monthly-cost-analysis.py"
    priority: low
    background: true
    resource_limits:
      cpu: 50%
      memory: 1GB
      
  - name: "Monthly performance review"
    schedule: "0 4 1 * *"
    script: "scripts/monthly-performance-review.py"
    priority: medium
    background: true
    resource_limits:
      cpu: 45%
      memory: 900MB

# Global settings
settings:
  # Default resource limits for all background tasks
  default_limits:
    cpu: 25%
    memory: 500MB
    
  # Quiet hours (no background tasks except critical)
  quiet_hours:
    start: "22:00"
    end: "07:00"
    
  # Peak hours (reduce background task frequency)
  peak_hours:
    start: "09:00"
    end: "17:00"
    frequency_reduction: 50%
    
  # Notification settings
  notifications:
    on_failure: true
    on_completion: false
    channels:
      - log
      - intercom
