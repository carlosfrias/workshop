---
# Group variables for lab_nodes
# References vault-encrypted variables from vault.yml
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/xxx.yml --vault-password-file ./.vault_pass
#

# Vault-referenced variable — actual value lives in vault.yml
ansible_become_pass: "{{ vault_sudo_password }}"

# Node.js version for pi deployment (LTS)
nodejs_version: 20

# Hostname target for pi deployment (defaults to inventory hostname)
ansible_hostname_target: "{{ inventory_hostname }}"
