---
# Pi Update Playbook
# Runs `pi update` on all lab nodes to ensure latest version

- name: Update Pi on Lab Nodes
  hosts: lab_nodes
  gather_facts: no
  serial: 2
  
  tasks:
    - name: Check SSH connectivity
      wait_for_connection:
        timeout: 30
      failed_when: false
      register: ssh_check

    - name: Report unreachable nodes
      debug:
        msg: "⚠️  {{ inventory_hostname }} ({{ ansible_host }}) - SSH UNREACHABLE"
      when: not ssh_check.success

    - name: Get pre-update pi version
      command: pi --version
      register: pi_before
      failed_when: false
      changed_when: false
      when: ssh_check.success

    - name: Run pi update
      command: pi update
      register: pi_update_result
      failed_when: false
      changed_when: pi_update_result.rc == 0
      when: ssh_check.success and pi_before.rc == 0

    - name: Get post-update pi version
      command: pi --version
      register: pi_after
      failed_when: false
      changed_when: false
      when: ssh_check.success and pi_before.rc == 0

    - name: Report update results
      debug:
        msg: |
          ✅ {{ inventory_hostname }} ({{ ansible_host }})
             Before: {{ pi_before.stdout | default('N/A') }}
             After:  {{ pi_after.stdout | default('N/A') }}
             Status: {{ 'UPDATED' if pi_update_result.rc == 0 else 'NO CHANGE' }}
      when: ssh_check.success and pi_before.rc == 0

    - name: Report pi not installed
      debug:
        msg: "❌ {{ inventory_hostname }} ({{ ansible_host }}) - Pi NOT INSTALLED (run install-pi.yml first)"
      when: ssh_check.success and pi_before.rc != 0
