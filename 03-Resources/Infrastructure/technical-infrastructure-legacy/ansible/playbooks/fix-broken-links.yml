---
# =============================================================================
# fix-broken-links.yml — Ansible Playbook for TI-WIKI-LINKS
# =============================================================================
# Purpose: Fix all broken internal wiki links across the Trading Desk workspace
# Usage:   ansible-playbook -i localhost, -c local fix-broken-links.yml
# Domain:  technical-infrastructure
# Tags:    fix, verify, all
# =============================================================================

- name: TI-WIKI-LINKS — Fix Broken Internal Wiki Links
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    workspace: "/Users/friasc/Cloud/ai-trading-workspace"
    scripts_dir: "{{ workspace }}/technical-infrastructure/scripts"
    log_dir: "{{ workspace }}/logs/wiki-links"
    fix_steps:
      - { name: "Step 001 — Home page table links", script: "fix-wiki-home-links.py", log: "step-001.log" }
      - { name: "Step 002 — README cross-references", script: "fix-wiki-readme-links.py", log: "step-002.log" }
      - { name: "Step 003 — Model assignment strategy", script: "fix-wiki-model-assignment-links.py", log: "step-003.log" }
      - { name: "Step 004 — Anchor links", script: "fix-wiki-anchor-links.py", log: "step-004.log" }
      - { name: "Step 005 — Directory index.md files", script: "create-wiki-directory-indexes.py", log: "step-005.log" }

  tasks:
    # =====================================================================
    # PRE-FLIGHT
    # =====================================================================
    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ log_dir }}"
        state: directory
        mode: "0755"
      tags: [always]

    - name: Verify all fix scripts exist
      ansible.builtin.stat:
        path: "{{ scripts_dir }}/{{ item.script }}"
      loop: "{{ fix_steps }}"
      register: script_stat
      tags: [always]

    - name: Fail if any fix script is missing
      ansible.builtin.fail:
        msg: "Missing script: {{ item.item.script }}"
      loop: "{{ script_stat.results }}"
      when: not item.stat.exists
      tags: [always]

    # =====================================================================
    # STEP 001–005: Execute Fix Scripts Sequentially
    # =====================================================================
    - name: "{{ item.name }}"
      ansible.builtin.command:
        cmd: "python3 {{ scripts_dir }}/{{ item.script }}"
      loop: "{{ fix_steps }}"
      register: fix_results
      changed_when: fix_results.rc == 0
      tags: [fix, all]

    - name: Log step output
      ansible.builtin.copy:
        content: "{{ item.stdout }}\n{{ item.stderr }}"
        dest: "{{ log_dir }}/{{ item.item.log }}"
      loop: "{{ fix_results.results }}"
      when: item.stdout is defined or item.stderr is defined
      tags: [fix, all]

    # =====================================================================
    # STEP 006: Build + Verify
    # =====================================================================
    - name: Step 006a — npm run build (generate dist for link testing)
      ansible.builtin.command:
        cmd: "npm run build"
        chdir: "{{ workspace }}"
      register: npm_build
      changed_when: npm_build.rc == 0
      tags: [verify, all]

    - name: Step 006b — Run link verification harness
      ansible.builtin.command:
        cmd: "python3 {{ scripts_dir }}/test-wiki-links.py"
        chdir: "{{ workspace }}"
      register: link_test
      changed_when: false
      tags: [verify, all]

    - name: Step 006c — Log verification results
      ansible.builtin.copy:
        content: |
          Build exit code: {{ npm_build.rc }}
          Link test exit code: {{ link_test.rc }}
          Link test output:
          {{ link_test.stdout | default('(no stdout)', true) }}
          {{ link_test.stderr | default('(no stderr)', true) }}
        dest: "{{ log_dir }}/step-006.log"
      tags: [verify, all]

    # =====================================================================
    # SUMMARY
    # =====================================================================
    - name: Report results
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "TI-WIKI-LINKS Playbook Complete"
          - "========================================"
          - "Fix steps run: {{ fix_steps | length }}"
          - "Build status: {{ 'PASS' if npm_build.rc == 0 else 'FAIL' }}"
          - "Link test status: {{ 'PASS' if link_test.rc == 0 else 'FAIL' }}"
          - "Logs: {{ log_dir }}"
          - "========================================"
      tags: [always]

    - name: Fail if link test failed
      ansible.builtin.fail:
        msg: "Link test failed. Check {{ log_dir }}/step-006.log for details."
      when: link_test.rc != 0
      tags: [verify, all]
