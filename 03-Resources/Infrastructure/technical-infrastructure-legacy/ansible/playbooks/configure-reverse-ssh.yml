---
# Configure Reverse SSH from Lab Nodes to Orchestrator
# Purpose: Enable lab nodes to mount orchestrator workspace via SSHFS
# Prerequisites:
#   - Orchestrator must have Remote Login enabled (System Preferences → Sharing → Remote Login)
#   - Orchestrator SSH key must be deployed to all lab nodes
#   - sshfs must be installed on lab nodes (already done 2026-05-05)
#
# Usage:
#   ansible-playbook -i inventory.ini playbooks/configure-reverse-ssh.yml
#
# Verification:
#   ssh fnet1 "ssh -o BatchMode=yes 192.168.0.140 echo ok"

- name: Configure Reverse SSH for SSHFS Mount Capability
  hosts: lab_nodes
  become: true
  gather_facts: true

  vars:
    orchestrator_ip: "192.168.0.140"
    orchestrator_user: "friasc"
    sshfs_mount_point: "/mnt/orchestrator-workspace"
    
  tasks:
    - name: Verify SSH connectivity to orchestrator
      command: ssh -o BatchMode=yes -o ConnectTimeout=10 {{ orchestrator_user }}@{{ orchestrator_ip }} echo "SSH OK"
      register: ssh_test
      ignore_errors: true
      changed_when: false

    - name: Report SSH connectivity status
      debug:
        msg: "SSH to orchestrator: {{ 'SUCCESS' if ssh_test.rc == 0 else 'FAILED - check Remote Login and firewall' }}"
      when: ssh_test.rc != 0

    - name: Ensure SSH known_hosts entry exists for orchestrator
      known_hosts:
        name: "{{ orchestrator_ip }}"
        key: "{{ orchestrator_ip }} ssh-rsa AAAA..."  # Will be auto-populated on first connect
        state: present
      ignore_errors: true

    - name: Create SSHFS mount point directory
      file:
        path: "{{ sshfs_mount_point }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Test SSHFS mount capability (dry-run)
      command: sshfs --version
      register: sshfs_version
      changed_when: false

    - name: Report SSHFS installation status
      debug:
        msg: "SSHFS version: {{ sshfs_version.stdout_lines[0] }}"

    - name: Generate SSHFS mount script
      copy:
        dest: "/usr/local/bin/mount-orchestrator-workspace.sh"
        mode: '0755'
        content: |
          #!/bin/bash
          # Mount orchestrator workspace via SSHFS
          # Usage: sudo mount-orchestrator-workspace.sh [node_id]
          
          ORCHESTRATOR_IP="{{ orchestrator_ip }}"
          ORCHESTRATOR_USER="{{ orchestrator_user }}"
          MOUNT_POINT="{{ sshfs_mount_point }}"
          NODE_ID="${1:-$(hostname)}"
          
          set -e
          
          echo "[INFO] Mounting ${ORCHESTRATOR_USER}@${ORCHESTRATOR_IP}:/Users/${ORCHESTRATOR_USER}/Dropbox/ai-trading-workspace to ${MOUNT_POINT}"
          
          # Check if already mounted
          if mountpoint -q "${MOUNT_POINT}"; then
            echo "[WARN] Already mounted at ${MOUNT_POINT}"
            exit 0
          fi
          
          # Mount with options for stability
          sshfs -o reconnect,ServerAliveInterval=15,ServerAliveCountMax=3,allow_other \
                "${ORCHESTRATOR_USER}@${ORCHESTRATOR_IP}:/Users/${ORCHESTRATOR_USER}/Dropbox/ai-trading-workspace" \
                "${MOUNT_POINT}"
          
          echo "[SUCCESS] Mounted successfully"
          echo "[INFO] Node ID: ${NODE_ID}"
          echo "[INFO] Test: ls ${MOUNT_POINT}/wiki"

    - name: Generate SSHFS unmount script
      copy:
        dest: "/usr/local/bin/unmount-orchestrator-workspace.sh"
        mode: '0755'
        content: |
          #!/bin/bash
          # Unmount orchestrator workspace
          # Usage: sudo unmount-orchestrator-workspace.sh
          
          MOUNT_POINT="{{ sshfs_mount_point }}"
          
          set -e
          
          if ! mountpoint -q "${MOUNT_POINT}"; then
            echo "[INFO] Not mounted at ${MOUNT_POINT}"
            exit 0
          fi
          
          echo "[INFO] Unmounting ${MOUNT_POINT}"
          fusermount -u "${MOUNT_POINT}" || umount "${MOUNT_POINT}"
          
          echo "[SUCCESS] Unmounted successfully"

    - name: Create systemd service for auto-mount (optional)
      copy:
        dest: "/etc/systemd/system/orchestrator-workspace-mount.service"
        mode: '0644'
        content: |
          [Unit]
          Description=Mount Orchestrator Workspace via SSHFS
          After=network-online.target
          Wants=network-online.target
          
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/mount-orchestrator-workspace.sh
          ExecStop=/usr/local/bin/unmount-orchestrator-workspace.sh
          RemainAfterExit=yes
          User={{ ansible_user_id }}
          
          [Install]
          WantedBy=multi-user.target
      tags:
        - systemd
        - optional

    - name: Verify SSHFS scripts are executable
      stat:
        path: "{{ item }}"
      loop:
        - /usr/local/bin/mount-orchestrator-workspace.sh
        - /usr/local/bin/unmount-orchestrator-workspace.sh
      register: script_stats

    - name: Report installation summary
      debug:
        msg: |
          === SSHFS Mount Capability Installation Summary ===
          Node: {{ inventory_hostname }}
          SSHFS Version: {{ sshfs_version.stdout_lines[0] }}
          Mount Point: {{ sshfs_mount_point }}
          Mount Script: /usr/local/bin/mount-orchestrator-workspace.sh
          Unmount Script: /usr/local/bin/unmount-orchestrator-workspace.sh
          
          Next Steps:
          1. Test mount: sudo mount-orchestrator-workspace.sh
          2. Verify: ls {{ sshfs_mount_point }}/wiki
          3. Unmount: sudo unmount-orchestrator-workspace.sh
          
          For auto-mount on boot:
            sudo systemctl enable orchestrator-workspace-mount
            sudo systemctl start orchestrator-workspace-mount
