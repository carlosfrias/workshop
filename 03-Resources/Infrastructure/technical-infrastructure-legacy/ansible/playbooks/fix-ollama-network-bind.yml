---
# Fix Ollama Network Binding
# Ensures Ollama binds to 0.0.0.0:11434 instead of 127.0.0.1:11434

- name: Fix Ollama Network Binding on Lab Nodes
  hosts: lab_nodes
  gather_facts: no
  become: yes

  tasks:
    - name: Read current Ollama service file
      ansible.builtin.slurp:
        src: /etc/systemd/system/ollama.service
      register: service_b64

    - name: Decode service file
      ansible.builtin.set_fact:
        service_content: "{{ service_b64.content | b64decode }}"

    - name: Rebuild service file with correct [Service] section
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service
        content: |
          [Unit]
          Description=Ollama Service
          After=network-online.target

          [Service]
          User=friasc
          Group=friasc
          ExecStart=/usr/local/bin/ollama serve
          Restart=always
          RestartSec=3
          Environment="OLLAMA_HOST=0.0.0.0"
          Environment="HOME=/home/friasc"

          [Install]
          WantedBy=default.target
        owner: root
        group: root
        mode: '0644'
      when: service_content is search('ollama')

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Restart Ollama service
      ansible.builtin.systemd:
        name: ollama
        state: restarted
        enabled: yes

    - name: Wait for Ollama API to become available
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:11434/api/tags"
        method: GET
        status_code: 200
      register: api_check
      until: api_check.status == 200
      retries: 15
      delay: 2
      ignore_errors: yes

    - name: Report status
      ansible.builtin.debug:
        msg: "Node {{ inventory_hostname }}: Ollama API status {{ api_check.status | default('UNREACHABLE') }}"
