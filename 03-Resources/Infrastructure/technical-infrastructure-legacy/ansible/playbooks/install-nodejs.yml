---
# [S-TIGHT] install-nodejs.yml — Node.js v20 Direct Installation Playbook
# Purpose: Install Node.js v20 LTS directly from nodejs.org (not Ubuntu repos)
# Target: Ubuntu lab nodes (fnet1-fnet7)
# Author: Trading Desk Infrastructure
# Date: 2026-05-14
# Issue Home: technical-infrastructure/wiki/operational/issues/TI-041/
# Related: TI-041 Phase 1 (fnet5 Node.js upgrade)

- name: Install Node.js from official distribution
  hosts: lab_nodes
  gather_facts: yes
  become: yes
  strategy: free

  vars:
    nodejs_version: "20.20.2"
    nodejs_dist_url: "https://nodejs.org/dist/v{{ nodejs_version }}"
    nodejs_tarball: "node-v{{ nodejs_version }}-linux-x64.tar.xz"
    nodejs_install_path: /usr/local

  tasks:
    - name: Ensure prerequisite packages are installed
      ansible.builtin.apt:
        name:
          - curl
          - xz-utils
        state: present
        update_cache: no

    - name: Check if Node.js is already installed
      ansible.builtin.command: node --version
      register: node_check
      changed_when: false
      ignore_errors: yes

    - name: Remove existing nodejs package (Ubuntu repo version)
      ansible.builtin.apt:
        name: nodejs
        state: absent
        purge: yes
      when: node_check.stdout is defined

    - name: Create temporary directory for download
      ansible.builtin.tempfile:
        state: directory
        prefix: nodejs-install-
      register: tmpdir

    - name: Download Node.js tarball
      ansible.builtin.get_url:
        url: "{{ nodejs_dist_url }}/{{ nodejs_tarball }}"
        dest: "{{ tmpdir.path }}/{{ nodejs_tarball }}"
        mode: '0644'
      register: download_result

    - name: Extract Node.js tarball
      ansible.builtin.unarchive:
        src: "{{ tmpdir.path }}/{{ nodejs_tarball }}"
        dest: "{{ tmpdir.path }}"
        remote_src: yes
        creates: "{{ tmpdir.path }}/node-v{{ nodejs_version }}-linux-x64/bin/node"

    - name: Install Node.js binaries
      ansible.builtin.copy:
        src: "{{ tmpdir.path }}/node-v{{ nodejs_version }}-linux-x64/{{ item }}"
        dest: "{{ nodejs_install_path }}/{{ item }}"
        remote_src: yes
        mode: '0755'
      loop:
        - bin/node
        - bin/npm
        - bin/npx
        - include
        - lib/node_modules

    - name: Verify Node.js installation
      ansible.builtin.command: node --version
      register: node_version
      changed_when: false

    - name: Verify npm installation
      ansible.builtin.command: npm --version
      register: npm_version
      changed_when: false

    - name: Verify npx installation
      ansible.builtin.command: npx --version
      register: npx_version
      changed_when: false

    - name: Report installed versions
      ansible.builtin.set_fact:
        install_result:
          node_id: "{{ inventory_hostname }}"
          node_version: "{{ node_version.stdout }}"
          npm_version: "{{ npm_version.stdout }}"
          npx_version: "{{ npx_version.stdout }}"
          target_version: "v{{ nodejs_version }}"
          status: "{{ 'ok' if node_version.stdout == 'v' + nodejs_version else 'needs_review' }}"

    - name: Output structured JSON result
      ansible.builtin.debug:
        msg: "{{ install_result | to_json }}"

    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ tmpdir.path }}"
        state: absent
