---
# Playbook: Migrate worker data to /srv/lab-worker/
- name: Migrate queue data
  hosts: lab_nodes
  gather_facts: no
  become: yes
  strategy: free

  tasks:
    - name: Ensure new directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      loop:
        - /srv/lab-worker/pending
        - /srv/lab-worker/running
        - /srv/lab-worker/results
        - /srv/lab-worker/logs

    - name: Migrate old task files
      ansible.builtin.shell: |
        if [ -d /srv/tasks/pending ] && [ "$(ls /srv/tasks/pending/*.json 2>/dev/null)" ]; then
           mv /srv/tasks/pending/*.json /srv/lab-worker/pending/ 2>/dev/null || true
        fi
        if [ -d /srv/tasks/running ] && [ "$(ls /srv/tasks/running/*.json 2>/dev/null)" ]; then
           mv /srv/tasks/running/*.json /srv/lab-worker/running/ 2>/dev/null || true
        fi
      ignore_errors: true

    - name: Migrate old result files
      ansible.builtin.shell: |
        if [ -d /srv/results ] && [ "$(ls /srv/results/*.json 2>/dev/null)" ]; then
           mv /srv/results/*.json /srv/lab-worker/results/ 2>/dev/null || true
        fi
      ignore_errors: true

    - name: Remove old directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /srv/tasks
        - /srv/results
      ignore_errors: true
