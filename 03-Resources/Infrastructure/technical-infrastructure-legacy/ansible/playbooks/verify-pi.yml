---
# verify-pi.yml - Confirm pi CLI version and PATH on lab nodes
- name: Verify pi installation
  hosts: lab_nodes
  tasks:
    - name: Check pi in PATH
      ansible.builtin.command: which pi
      register: pi_path
      changed_when: false
      ignore_errors: yes

    - name: Check pi version
      ansible.builtin.shell: pi --version 2>&1
      register: pi_version
      changed_when: false
      ignore_errors: yes

    - name: Check Node.js version
      ansible.builtin.command: node --version
      register: node_version
      changed_when: false

    - name: Report verification result
      ansible.builtin.set_fact:
        verify_result:
          node_id: "{{ inventory_hostname }}"
          pi_version: "{{ (pi_version.stdout | default('') | regex_replace('^v', '') | trim) | default((pi_version.stderr | default('') | regex_replace('^v', '') | trim), true) | default('missing', true) }}"
          path_ok: "{{ not pi_path.failed }}"
          node_version: "{{ node_version.stdout }}"
          status: "{{ 'ok' if not pi_version.failed else 'failed' }}"
  post_tasks:
    - name: Output structured JSON
      ansible.builtin.debug:
        msg: "{{ verify_result | to_json }}"
