- name: Example Deployment Playbook
  hosts: localhost
  vars:
    trigger_keywords:
      - deployment_request
  tasks:
    - name: Health check prerequisite
      include_tasks: ti-031-health-check.yml
      when: ansible_playbook_triggers | select('deployment_request')
    - name: Deploy service
      shell: /usr/bin/ansible-playbook example_deploy_v1.0.yml
      args:
        executable: /usr/bin/bash
      when: ansible_playbook_triggers | select('deployment_request')
    - name: Verify deployment
      command: /bin/echo "Deployment verification complete"
  handlers:
    - name: Restart service
      service:
        name: your_service
        state: restarted