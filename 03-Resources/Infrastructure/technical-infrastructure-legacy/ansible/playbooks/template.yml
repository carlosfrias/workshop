- name: Health Check Integration
  hosts: localhost
  vars:
    trigger_keywords:
      - system_failure
      - deployment_request
      - scheduled_audit
      - log_threshold_exceeded
      - data_loss_detected
  tasks:
    - name: Run health check
      include: ti-031-health-check.yml
      when: ansible_playbook_triggers | select('system_failure')
    - name: Execute deployment
      include: example_deploy_v1.0.yml
      when: ansible_playbook_triggers | select('deployment_request')
  handlers:
    - name: Restart service
      service:
        name: your_service
        state: restarted
