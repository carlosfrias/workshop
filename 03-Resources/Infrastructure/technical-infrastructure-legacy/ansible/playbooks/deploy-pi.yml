---
# deploy-pi.yml - Install or upgrade pi CLI on lab nodes
- name: Deploy pi coding agent
  hosts: lab_nodes
  become: yes
  vars:
    pi_repo: "github:carlosfrias/pi-coding-agent"
    pi_version_target: "0.74.0"
  tasks:
    - name: Check current pi version
      ansible.builtin.shell: pi --version 2>&1
      register: pi_current
      ignore_errors: yes
      changed_when: false

    - name: Normalize pi version output
      ansible.builtin.set_fact:
        pi_version_raw: "{{ pi_current.stdout | default('') | regex_replace('^v', '') | trim }}"
      when: pi_current.stdout is defined and pi_current.stdout != ''

    - name: Check current Node.js version
      ansible.builtin.command: node --version
      register: node_current
      changed_when: false

    - name: Verify Node.js v20+
      ansible.builtin.fail:
        msg: "Node.js {{ node_current.stdout }} is too old. Run 'update_packages' trigger first."
      when: node_current.stdout is defined and node_current.stdout != '' and (node_current.stdout | regex_replace('^v', '')) is version('20.0.0', '<') and node_current.rc == 0

    - name: Install pi via npm
      ansible.builtin.shell: |
        rm -f /usr/local/bin/pi /usr/bin/pi 2>/dev/null || true
        npm uninstall -g @mariozechner/pi-coding-agent @earendil-works/pi-coding-agent 2>/dev/null || true
        npm install -g @earendil-works/pi-coding-agent
        ln -sf $(npm root -g)/@earendil-works/pi-coding-agent/dist/cli.js /usr/local/bin/pi
        chmod +x /usr/local/bin/pi
      when: pi_current.failed or (pi_version_raw is defined and pi_version_raw != '' and pi_version_raw is version(pi_version_target, '<'))
      register: pi_install

    - name: Verify pi installation
      ansible.builtin.shell: pi --version 2>&1
      register: pi_verify
      changed_when: false

    - name: Report deployment status
      ansible.builtin.set_fact:
        deploy_result:
          node_id: "{{ inventory_hostname }}"
          pi_version: "{{ (pi_verify.stderr | trim) | default(pi_verify.stdout | trim, true) | regex_replace('^v', '') }}"
          node_version: "{{ node_current.stdout }}"
          status: "{{ 'ok' if pi_install.changed or pi_verify.rc == 0 else 'failed' }}"
          previous_version: "{{ (pi_current.stderr | trim) | default(pi_current.stdout | trim, true) | default('none', true) | regex_replace('^v', '') }}"

  post_tasks:
    - name: Output structured JSON
      ansible.builtin.debug:
        msg: "{{ deploy_result | to_json }}"
