---
# Ansible Playbook: Server Hardening + Desktop-to-Server Cleanup
# For Trading Desk lab nodes (fnet2-fnet7)
# Run AFTER nodes reach Ubuntu 24.04
# 
# NOTE: Proper LVM restructuring (separate /boot, /var, /tmp partitions)
# requires REIMAGING from scratch. This playbook does what is SAFE on a
# running system:
#   - Remove desktop bloat
#   - Create directory structure under /
#   - Add swapfile (LVM swap is only ~1GB)
#   - Harden /tmp
#   - Configure logrotate
#
- name: Trading Desk Lab Node Cleanup and Hardening
  hosts: lab_nodes
  become: yes
  vars:
    swapfile_size: "16G"
    swapfile_path: "/swapfile"
    lab_user: "friasc"

  tasks:
    # ============================================================
    # 1. DESKTOP BLOAT REMOVAL
    # ============================================================
    - name: Stop and disable display manager
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - gdm
        - gdm3
        - lightdm
        - sddm
      failed_when: false
      ignore_errors: yes

    - name: Stop and disable desktop services
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - avahi-daemon
        - bluetooth
        - cups
        - cups-browsed
        - ModemManager
        - whoopsie
        - apport
        - speech-dispatcher
        - switcheroo-control
      failed_when: false

    - name: Remove desktop snap packages
      command: "snap remove {{ item }}"
      loop:
        - snap-store
        - firefox
        - mesa-2404
        - snapd-desktop-integration
        - gnome-3-38-2004
        - gnome-42-2204
        - gnome-46-2204
        - gtk-common-themes
      failed_when: false
      ignore_errors: yes

    - name: Remove desktop .deb packages
      apt:
        name:
          - ubuntu-desktop
          - ubuntu-desktop-minimal
          - gdm3
          - gdm
          - gnome-shell
          - gnome-session
          - gnome-control-center
          - gnome-settings-daemon
          - gnome-calculator
          - gnome-characters
          - gnome-disk-utility
          - gnome-font-viewer
          - gnome-logs
          - gnome-menus
          - gnome-power-manager
          - gnome-screenshot
          - gnome-system-monitor
          - gnome-terminal
          - gnome-text-editor
          - gnome-tweaks
          - gedit
          - gedit-common
          - eog
          - totem
          - yelp
          - shotwell
          - rhythmbox
          - cheese
          - remmina
          - thunderbird
          - libreoffice*
          - simple-scan
          - transmission-gtk
          - aisleriot
          - cheese
          - five-or-more
          - four-in-a-row
          - hitori
          - iagno
          - klotski
          - lightsoff
          - mahjongg
          - mines
          - quadrapassel
          - robots
          - solitaire
          - swell-foop
          - tali
          - gnome-sudoku
          - gnome-mahjongg
          - gnome-mines
          - gnome-robots
          - gnome-tetravex
          - gnome-nibbles
          - usb-creator-gtk
          - landscape-client-ui-install
        state: absent
        purge: yes
        autoremove: yes
      failed_when: false

    - name: Remove unnecessary fonts (save disk space)
      apt:
        name:
          - fonts-noto-cjk
          - fonts-noto-color-emoji
          - fonts-dejavu-core
          - fonts-liberation
          - fonts-freefont-ttf
        state: absent
        purge: yes
      failed_when: false

    # ============================================================
    # 2. SERVER PACKAGES INSTALLATION
    # ============================================================
    - name: Install core server packages
      apt:
        name:
          - openssh-server
          - vim
          - curl
          - htop
          - net-tools
          - dnsutils
          - docker.io
          - wireguard
          - wireguard-tools
          - nfs-common
          - lvm2
          - parted
          - jq
          - tree
          - ncdu
          - iotop
          - nethogs
          - tmux
          - screen
          - rsync
          - logrotate
          - fail2ban
          - unattended-upgrades
        state: present
        update_cache: yes

    - name: Ensure docker group exists and user is added
      user:
        name: "{{ lab_user }}"
        groups: docker
        append: yes

    - name: Enable and start services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - ssh
        - docker
        - fail2ban
        - unattended-upgrades

    # ============================================================
    # 3. DIRECTORY STRUCTURE (since we can't create new LVs)
    # ============================================================
    - name: Create server directory structure
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /srv
        - /srv/data
        - /srv/archive
        - /srv/models
        - /opt
        - /opt/local
        - /opt/scripts
        - /backup
        - /backup/system
        - /backup/configs
        - /var/log/trading-desk
        - /var/lib/ollama/models

    - name: Create user directories
      file:
        path: "/home/{{ lab_user }}/{{ item }}"
        state: directory
        owner: "{{ lab_user }}"
        group: "{{ lab_user }}"
        mode: "0755"
      loop:
        - workspace
        - scripts
        - .ssh
      become: yes

    # ============================================================
    # 4. SWAP STANDARDIZATION
    # ============================================================
    # Goal: Exactly one swap source per node — a 16GB swapfile at /swapfile
    # Removes: LVM swap volumes, old swapfiles, swap partitions from active use
    #
    # WARNING: This turns off ALL swap, removes it from fstab, then recreates
    # the standardized swapfile. Do not run on nodes with >0 swap usage.
    # ============================================================

    - name: Discover all current swap sources
      tags: swap
      ansible.builtin.command: swapon --show=NAME,TYPE --noheadings
      register: current_swap_sources
      changed_when: false
      ignore_errors: yes

    - name: Display discovered swap sources
      tags: swap
      ansible.builtin.debug:
        msg: "Found swap sources: {{ current_swap_sources.stdout_lines | default([]) }}"

    - name: Check if any swap is actively in use
      tags: swap
      ansible.builtin.command: swapon --show=USED --noheadings
      register: swap_usage
      changed_when: false

    - name: Warn if swap is actively in use
      tags: swap
      ansible.builtin.pause:
        seconds: 3
        prompt: |
          WARNING: One or more swap sources show non-zero usage.
          This is safe on idle lab nodes but risky on production.
          Continuing in 3 seconds...
      when: swap_usage.stdout is search('[1-9]')

    - name: Turn off ALL swap
      tags: swap
      ansible.builtin.command: swapoff -a
      when: current_swap_sources.stdout | length > 0

    - name: Remove all swap entries from /etc/fstab
      tags: swap
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '\s+swap\s+'
        state: absent
        backup: yes

    - name: Delete old swapfiles (not the standardized target)
      tags: swap
      ansible.builtin.file:
        path: "{{ item.split()[0] }}"
        state: absent
      loop: "{{ current_swap_sources.stdout_lines | default([]) }}"
      when:
        - item.split() | length >= 2
        - item.split()[1] == 'file'
        - item.split()[0] != swapfile_path
      ignore_errors: yes

    - name: Remove LVM swap volumes (best-effort)
      tags: swap
      ansible.builtin.command: |
        lv_name="{{ item.split('/')[3] | regex_replace('--', '-') }}"
        vg_name="{{ item.split('/')[2] | regex_replace('--', '-') }}"
        lvremove -y "/dev/${vg_name}/${lv_name}" 2>/dev/null || true
      loop: "{{ current_swap_sources.stdout_lines | default([]) }}"
      when:
        - item.split() | length >= 2
        - item.split()[0] is search('/dev/mapper/')
      ignore_errors: yes

    - name: Clean up unused VG space after LV removal
      tags: swap
      ansible.builtin.command: vgchange --refresh 2>/dev/null || true
      ignore_errors: yes

    - name: Check if standardized swapfile exists and is correct size
      tags: swap
      ansible.builtin.stat:
        path: "{{ swapfile_path }}"
        get_checksum: no
      register: swapfile_stat

    - name: Delete swapfile if wrong size or truncated
      tags: swap
      ansible.builtin.file:
        path: "{{ swapfile_path }}"
        state: absent
      when:
        - swapfile_stat.stat.exists
        - swapfile_stat.stat.size | int != (swapfile_size | human_to_bytes)

    - name: Create swapfile (16GB standard)
      tags: swap
      ansible.builtin.command: "fallocate -l {{ swapfile_size }} {{ swapfile_path }}"
      args:
        creates: "{{ swapfile_path }}"

    - name: Secure swapfile permissions
      tags: swap
      ansible.builtin.file:
        path: "{{ swapfile_path }}"
        mode: "0600"
        owner: root
        group: root

    - name: Initialize swapfile
      tags: swap
      ansible.builtin.command: "mkswap {{ swapfile_path }}"
      register: mkswap_result
      changed_when: "'Setting up swapspace version 1' in mkswap_result.stdout"

    - name: Enable swapfile
      tags: swap
      ansible.builtin.command: "swapon {{ swapfile_path }}"
      register: swapon_result
      changed_when: "'swapspace version 1' in swapon_result.stdout"

    - name: Add swapfile to /etc/fstab
      tags: swap
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "{{ swapfile_path }} none swap sw 0 0"
        regexp: "^\\{{ swapfile_path }}"
        state: present

    - name: Verify swap is active and correct size
      tags: swap
      ansible.builtin.command: swapon --show=NAME,SIZE --noheadings
      register: verify_swap
      changed_when: false

    - name: Display standardized swap status
      tags: swap
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} standardized swap: {{ verify_swap.stdout }}"

    - name: Fail if swapfile is not the only active swap
      tags: swap
      ansible.builtin.fail:
        msg: "Expected only {{ swapfile_path }} as swap, but found: {{ verify_swap.stdout }}"
      when:
        - verify_swap.stdout | length > 0
        - verify_swap.stdout is not search(swapfile_path)

    - name: Fail if swapfile size is wrong
      tags: swap
      ansible.builtin.fail:
        msg: "Expected {{ swapfile_size }} swapfile, but found: {{ verify_swap.stdout }}"
      when:
        - verify_swap.stdout | length > 0
        - verify_swap.stdout is not search(swapfile_size)

    # ============================================================
    # 5. /tmp HARDENING (tmpfs with limits and security)
    # ============================================================
    - name: Configure /tmp as tmpfs
      lineinfile:
        path: /etc/fstab
        line: "tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev,size=8G,mode=1777 0 0"
        regexp: "^tmpfs\\s+/tmp"
        state: present
      notify: remount tmp

    - name: Ensure /tmp is mounted
      mount:
        path: /tmp
        src: tmpfs
        fstype: tmpfs
        opts: "defaults,noexec,nosuid,nodev,size=8G,mode=1777"
        state: mounted

    # ============================================================
    # 6. LOGROTATE CONFIGURATION
    # ============================================================
    - name: Configure logrotate for system logs
      copy:
        dest: /etc/logrotate.d/trading-desk-system
        content: |
          /var/log/syslog
          /var/log/messages
          /var/log/kern.log
          /var/log/auth.log
          /var/log/daemon.log
          /var/log/cron.log
          {
              daily
              rotate 7
              compress
              delaycompress
              missingok
              notifempty
              create 0640 syslog adm
              sharedscripts
              postrotate
                  /usr/lib/rsyslog/rsyslog-rotate > /dev/null 2>&1 || true
              endscript
          }

    - name: Configure Docker log rotation
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "storage-driver": "overlay2"
          }
      notify: restart docker

    # ============================================================
    # 7. SYSTEM HARDENING
    # ============================================================
    - name: Disable unused filesystems
      copy:
        dest: /etc/modprobe.d/blacklist-filesystems.conf
        content: |
          install cramfs /bin/true
          install freevxfs /bin/true
          install jffs2 /bin/true
          install hfs /bin/true
          install hfsplus /bin/true
          install squashfs /bin/true
          install udf /bin/true

    - name: Set sysctl hardening
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: "kernel.randomize_va_space", value: "2" }
        - { name: "net.ipv4.ip_forward", value: "0" }
        - { name: "net.ipv4.conf.all.send_redirects", value: "0" }
        - { name: "net.ipv4.conf.default.send_redirects", value: "0" }
        - { name: "net.ipv4.conf.all.accept_redirects", value: "0" }
        - { name: "net.ipv4.conf.default.accept_redirects", value: "0" }
        - { name: "net.ipv4.conf.all.secure_redirects", value: "0" }
        - { name: "net.ipv4.conf.default.secure_redirects", value: "0" }
        - { name: "net.ipv4.conf.all.log_martians", value: "1" }
        - { name: "net.ipv4.conf.default.log_martians", value: "1" }
        - { name: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
        - { name: "net.ipv4.icmp_ignore_bogus_error_responses", value: "1" }
        - { name: "net.ipv4.conf.all.rp_filter", value: "1" }
        - { name: "net.ipv4.conf.default.rp_filter", value: "1" }
        - { name: "net.ipv4.tcp_syncookies", value: "1" }
        - { name: "fs.suid_dumpable", value: "0" }

    - name: Set file limits for Ollama/high-load workloads
      copy:
        dest: /etc/security/limits.d/99-trading-desk.conf
        content: |
          * soft nofile 65536
          * hard nofile 65536
          * soft nproc 65536
          * hard nproc 65536
          * soft memlock unlimited
          * hard memlock unlimited

    - name: Set swappiness for server workloads
      sysctl:
        name: vm.swappiness
        value: "10"
        state: present
        reload: yes

    # ============================================================
    # 8. CLEANUP
    # ============================================================
    - name: Clean apt cache
      apt:
        autoclean: yes
        autoremove: yes

    - name: Clean snap cache
      file:
        path: /var/lib/snapd/cache
        state: absent

    - name: Clean thumbnails
      file:
        path: "/home/{{ lab_user }}/.cache/thumbnails"
        state: absent

    - name: Clean old logs
      shell: |
        find /var/log -type f -name "*.gz" -mtime +30 -delete
        find /var/log -type f -name "*.old" -mtime +30 -delete
        find /var/log -type f -name "*.1" -mtime +30 -delete
      changed_when: true

    # ============================================================
    # 9. VERIFICATION
    # ============================================================
    - name: Check final state
      shell: |
        echo "=== Services Status ==="
        systemctl list-units --type=service --state=running | grep -E 'gdm|avahi|bluetooth|cups|ModemManager' || echo "No desktop services running"
        echo ""
        echo "=== Snap Packages ==="
        snap list | wc -l | tr -d ' ' | xargs -I{} echo "Snap packages remaining: {}"
        echo ""
        echo "=== RAM Usage ==="
        free -h | grep Mem
        echo ""
        echo "=== Disk Usage ==="
        df -h / | tail -1
        echo ""
        echo "=== Swap Status ==="
        free -h | grep Swap
        echo ""
        echo "=== Docker Status ==="
        systemctl is-active docker
        docker --version || echo "Docker not available"
      register: system_check
      changed_when: false

    - name: Display verification output
      debug:
        var: system_check.stdout_lines

  handlers:
    - name: remount tmp
      command: mount -o remount /tmp

    - name: restart docker
      systemd:
        name: docker
        state: restarted
        enabled: yes
