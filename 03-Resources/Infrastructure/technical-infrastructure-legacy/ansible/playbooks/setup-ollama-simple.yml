---
# Simple Ollama Setup for Lab Nodes
# No depot, no vault — direct install + pull on each node
# Idempotent: skips nodes that already have Ollama installed

- name: Deploy Ollama to Lab Nodes
  hosts: lab_nodes
  gather_facts: yes

  vars:
    target_model: "qwen3.5:4b"

  tasks:
    # ========================================================================
    # 1. Install Ollama (idempotent)
    # ========================================================================
    - name: Check if Ollama is installed
      ansible.builtin.command: ollama --version
      register: ollama_check
      changed_when: false
      ignore_errors: true

    - name: Install Ollama
      ansible.builtin.shell: |
        curl -fsSL https://ollama.com/install.sh | sh
      when: ollama_check.rc != 0

    - name: Ensure systemd service is enabled
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started
      when: ansible_service_mgr == 'systemd'

    - name: Wait for Ollama API
      ansible.builtin.uri:
        url: http://localhost:11434/api/tags
        status_code: 200
      register: api_ready
      retries: 10
      delay: 5
      until: api_ready.status == 200

    # ========================================================================
    # 2. Pull target models
    # ========================================================================
    - name: Pull qwen3.5:4b
      ansible.builtin.command: ollama pull {{ target_model }}
      register: model_pull
      retries: 3
      delay: 30
      until: model_pull.rc == 0

    # ========================================================================
    # 3. Verify
    # ========================================================================
    - name: List installed models
      ansible.builtin.command: ollama list
      register: model_list
      changed_when: false

    - name: Report
      ansible.builtin.debug:
        msg: "✅ {{ inventory_hostname }} — {{ model_list.stdout_lines | length }} models installed"
