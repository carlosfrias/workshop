---
# Reboot Persistence Test Playbook
# Reboots nodes and verifies pi/intercom availability after reboot

- name: Test Pi Persistence After Reboot
  hosts: lab_nodes
  gather_facts: no
  serial: 1  # Reboot one node at a time
  max_fail_percentage: 50
  
  tasks:
    - name: Get pre-reboot pi version
      command: pi --version
      register: pi_before_reboot
      failed_when: false
      changed_when: false
      ignore_errors: yes

    - name: Record pre-reboot status
      debug:
        msg: "📋 {{ inventory_hostname }} - Pre-reboot: Pi {{ pi_before_reboot.stdout | default('NOT INSTALLED') }}"
      when: pi_before_reboot.rc == 0

    - name: Initiate reboot
      command: sudo shutdown --reboot now
      async: 1
      poll: 0
      failed_when: false
      when: pi_before_reboot.rc == 0
      register: reboot_initiated

    - name: Wait for node to come back online
      wait_for_connection:
        delay: 60
        timeout: 300
      when: reboot_initiated is defined and reboot_initiated.failed == false
      register: reboot_success
      failed_when: false

    - name: Report reboot failure
      debug:
        msg: "❌ {{ inventory_hostname }} - Failed to reboot or unreachable after 5 minutes"
      when: reboot_success is defined and not reboot_success.success

    - name: Wait for services to stabilize
      wait_for:
        timeout: 30
      when: reboot_success is defined and reboot_success.success

    - name: Test pi availability after reboot
      shell: |
        source ~/.bashrc
        pi --version
      register: pi_after_reboot
      failed_when: false
      changed_when: false
      when: reboot_success is defined and reboot_success.success

    - name: Report post-reboot status - SUCCESS
      debug:
        msg: |
          ✅ {{ inventory_hostname }} ({{ ansible_host }})
             Pre-reboot:  {{ pi_before_reboot.stdout | default('N/A') }}
             Post-reboot: {{ pi_after_reboot.stdout | default('N/A') }}
             Status: PERSISTENT
      when: pi_after_reboot.rc == 0

    - name: Report post-reboot status - FAILED
      debug:
        msg: |
          ❌ {{ inventory_hostname }} ({{ ansible_host }})
             Status: PI NOT AVAILABLE AFTER REBOOT
             Action Required: Fix PATH or installation
      when: pi_after_reboot.rc != 0
