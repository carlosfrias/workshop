---
# Ansible Playbook: Serve Trading Desk Wiki
# Purpose: Brings up or tears down the VitePress dev server for local wiki browsing.
#
# The VitePress site now lives at the PROJECT ROOT:
#   - Config: .vitepress/config.js
#   - Content: wiki/ (unified: trading desk + operations + technical infrastructure)
#   - node_modules: symlinked from technical-infrastructure/wiki-build/node_modules
#
# USAGE:
#   cd technical-infrastructure/ansible
#
#   Toggle (default): stop if running, start if not
#     ansible-playbook -i localhost, -c local playbooks/serve-wiki.yml
#
#   Force start (restart if already running)
#     ansible-playbook -i localhost, -c local playbooks/serve-wiki.yml -e "wiki_state=start"
#
#   Force start without opening browser
#     ansible-playbook -i localhost, -c local playbooks/serve-wiki.yml -e "wiki_state=start open_browser=false"
#
#   Force stop
#     ansible-playbook -i localhost, -c local playbooks/serve-wiki.yml -e "wiki_state=stop"
#
#   Check status only
#     ansible-playbook -i localhost, -c local playbooks/serve-wiki.yml -e "wiki_state=status"
#
# NOTES:
#   - Runs from the project root where .vitepress/config.js lives
#   - Content is read from wiki/ (includes trading-desk/, operations/, technical-infrastructure/)
#   - No stale copies; edits to any wiki/*.md are reflected immediately
#   - Server runs on http://localhost:5173/
#   - Log file: /tmp/vitepress-wiki.log
#   - On macOS, automatically opens default browser to wiki URL

- name: Serve Trading Desk Wiki
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    open_browser: "{{ open_browser | default(true) }}"

  roles:
    - role: wiki-local

  post_tasks:
    - name: "[TI-WIKI] URL: http://localhost:5173/ (or stopped)"
      ansible.builtin.debug:
        msg:
          - ""
          - "╔═══════════════════════════════════════════════════════════════╗"
          - "║  Trading Desk Wiki                                            ║"
          - "{% if _wiki_effective_state == 'start' %}║  → http://localhost:5173/                                     ║{% elif _wiki_effective_state == 'restart' %}║  → Wiki restarted at http://localhost:5173/                   ║{% elif _wiki_effective_state == 'stop' %}║  → Server stopped. Port 5173 is free.                         ║{% else %}║  → http://localhost:5173/  (server was already running)        ║{% endif %}"
          - "╚═══════════════════════════════════════════════════════════════╝"
          - ""
