---
# Ollama Deployment Playbook
# Hardware-aware, tiered, depot-backed deployment for lab nodes.

- name: Setup Ollama on Lab Nodes
  hosts: lab_nodes
  gather_facts: yes
  strategy: free

  vars:
    run_benchmarks: true

  pre_tasks:
    - name: "Gather depot node facts"
      ansible.builtin.setup:
      delegate_to: "{{ ollama_depot_host }}"
      delegate_facts: true
      run_once: true

  roles:
    - ollama-setup
