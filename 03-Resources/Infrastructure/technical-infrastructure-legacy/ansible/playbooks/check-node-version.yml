---
# check-node-version.yml - Verify Node.js is v20+ on lab node
- name: Check Node.js version
  hosts: lab_nodes
  tasks:
    - name: Node.js version
      ansible.builtin.command: node --version
      register: node_version
      changed_when: false
      ignore_errors: yes

    - name: Parse version
      ansible.builtin.set_fact:
        node_v: "{{ node_version.stdout | regex_replace('^v', '') }}"
        v20_ok: "{{ (node_version.stdout | regex_replace('^v', '')) is version('20.0.0', '>=') }}"
      when: not node_version.failed and node_version.stdout is defined and node_version.stdout != ''

    - name: Report
      ansible.builtin.set_fact:
        check_result:
          node_id: "{{ inventory_hostname }}"
          node_version: "{{ node_version.stdout | default('missing') }}"
          node_version_parsed: "{{ node_v | default('unknown') }}"
          v20_ok: "{{ v20_ok | default(false) }}"
          status: "{{ 'ok' if v20_ok | default(false) else 'needs_upgrade' }}"
  post_tasks:
    - name: Output structured JSON
      ansible.builtin.debug:
        msg: "{{ check_result | to_json }}"
