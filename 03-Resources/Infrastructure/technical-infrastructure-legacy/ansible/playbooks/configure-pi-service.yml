---
# configure-pi-service.yml - Deploy systemd unit for persistent pi-agent
- name: Configure pi-agent systemd service
  hosts: lab_nodes
  become: yes
  tasks:
    - name: Create pi agent user
      ansible.builtin.user:
        name: piagent
        home: /var/lib/piagent
        shell: /bin/bash
        system: yes

    - name: Create systemd unit for pi-agent
      ansible.builtin.template:
        src: pi-agent.service.j2
        dest: /etc/systemd/system/pi-agent.service
        owner: root
        group: root
        mode: '0644'
      vars:
        node_name: "{{ inventory_hostname }}-worker"
        workspace: "/srv/lab-worker/{{ inventory_hostname }}"
      notify:
        - Reload systemd

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/srv/lab-worker/{{ inventory_hostname }}"
        state: directory
        owner: piagent
        group: piagent
        mode: '0755'

    - name: Result
      ansible.builtin.set_fact:
        configure_result:
          node_id: "{{ inventory_hostname }}"
          systemd_active: true
          auto_restart: enabled
          service_path: "/etc/systemd/system/pi-agent.service"
          status: ok
  post_tasks:
    - name: Output JSON
      ansible.builtin.debug:
        msg: "{{ configure_result | to_json }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
