---
# Setup VPN Gateway on fnet1
# Installs WireGuard server + DuckDNS + configures single peer (orchestrator)

- name: Setup WireGuard VPN Gateway
  hosts: vpn_gateway
  become: true
  gather_facts: true

  vars:
    # Orchestrator peer — update public key after first client key generation
    wg_peers:
      - name: orchestrator
        public_key: "{{ orchestrator_public_key | default('') }}"
        allowed_ips: "10.200.200.2/32"

  pre_tasks:
    - name: "VPN Gateway | Fail if DuckDNS token not provided"
      ansible.builtin.fail:
        msg: "DuckDNS token must be provided via --extra-vars 'duckdns_token=xxx'"
      when:
        - duckdns_token is not defined
        - duckdns_token | length == 0

    - name: "VPN Gateway | Generate orchestrator keys if missing locally"
      ansible.builtin.shell: |
        mkdir -p {{ playbook_dir }}/../vpn-keys
        wg genkey | tee {{ playbook_dir }}/../vpn-keys/orchestrator.private.key | wg pubkey > {{ playbook_dir }}/../vpn-keys/orchestrator.public.key
      args:
        creates: "{{ playbook_dir }}/../vpn-keys/orchestrator.public.key"
      delegate_to: localhost
      run_once: true
      become: false

    - name: "VPN Gateway | Read orchestrator public key"
      ansible.builtin.command: "cat {{ playbook_dir }}/../vpn-keys/orchestrator.public.key"
      register: orch_pubkey_file
      delegate_to: localhost
      run_once: true
      become: false
      changed_when: false

    - name: "VPN Gateway | Set orchestrator public key"
      ansible.builtin.set_fact:
        orchestrator_public_key: "{{ orch_pubkey_file.stdout }}"

  roles:
    - role: wireguard-server
      vars:
        wg_peers:
          - name: orchestrator
            public_key: "{{ orchestrator_public_key }}"
            allowed_ips: "10.200.200.2/32"
    - role: duckdns-updater
      vars:
        duckdns_token: "{{ duckdns_token }}"
