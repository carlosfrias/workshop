---
# Pi Installation Playbook
# Installs Node.js 20+, pi-coding-agent, and pi-intercom on all lab nodes

- name: Install Pi on Lab Nodes
  hosts: lab_nodes
  gather_facts: yes
  serial: 2
  
  roles:
    - pi-installation

  post_tasks:
    - name: Generate installation report
      debug:
        msg: |
          ================================
          Pi Installation Report
          ================================
          Host: {{ inventory_hostname }}
          IP: {{ ansible_host }}
          Node.js: {{ ansible_facts.nodejs_version | default(nodejs_check.stdout | default('N/A')) }}
          Pi Version: {{ pi_installed_version.stdout | default('N/A') }}
          Status: {{ 'SUCCESS' if pi_verify.rc == 0 else 'FAILED' }}
