- name: Update System Packages
  hosts: localhost
  gather_facts: yes
  vars:
    trigger_keywords:
      - update
      - update_packages
      - upgrade
    rollback_enabled: yes
    backup_created: false
  tasks:
    - name: Check disk space before update
      command: df -h
      register: pre_update_check
      changed_when: false
    
    - name: Health check before execution
      include_tasks: ti-031-health-check.yml
      name: health_check
      tags: ti_031, pre_execute
    
    - name: Record pre-update system state
      debug:
        msg: "Pre-update system state captured for rollback"
      when: false
      changed_when: false

    - name: Backup critical packages
      block:
        - name: Create package backup
          shell: "cp -r /etc /etc_backup_{{ ansible_date_time.date }}_pre_package_update"
          register: backup_result
          changed_when: yes
          name: create_package_backup
          tags: backup

        - name: Log backup success
          debug:
            msg: "Package backup {{ backup_result.stdou }}"
          name: log_backup_success

      rescue:
        - name: Health check triggered by failure
          include_tasks: ti-031-health-check.yml
          name: health_check
          tags: ti_031, rollback

        - name: Log rollback trigger
          debug:
            msg: "Rollback triggered due to failure"
          tags: logs

        - name: Restore package backup
          shell: "cp -f /etc_backup_{{ ansible_date_time.date }}_pre_package_update /etc"
          name: restore_backup

        - name: Log rollback complete
          debug:
            msg: "Package restoration completed"
          tags: logs

    - name: Update system packages
      yum:
        name: "*"
        state: latest
        force: yes
      register: package_update_result
      name: update_packages
      tags: update

    - name: Verify package update
      command: rpm -qa
      register: verification
      changed_when: false

    - name: Report update status
      debug:
        msg: |
          Package update {{ package_update_result.stdout_lines | length }} packages installed
          Status: {{ package_update_result.rc == 0 and "successful" or "failed" }}
          Verification: {{ verification.stdout_lines | length }} total packages found
      when: false
      changed_when: false
