---
# Ansible Playbook: Generate Lab Capacity Report
# Purpose: Gather hardware specs, OS versions, Ollama models from all lab nodes
# Output: technical-infrastructure/lab-specs/lab-capacity-report.json
#
# USAGE:
#   ansible-playbook -i inventory.ini capacity-report.yml -kK
#   (prompts for SSH password and sudo password)
#
#   ansible-playbook -i inventory.ini capacity-report.yml --ask-pass --ask-become-pass

- name: Gather Lab Capacity Report
  hosts: all
  gather_facts: yes
  strategy: free

  tasks:
    # ──────────────────────────────────────────────────────────────
    # 1. Gather system facts
    # ──────────────────────────────────────────────────────────────
    - name: Ensure jq is installed
      ansible.builtin.apt:
        name: jq
        state: present
      become: yes
      when: inventory_hostname in groups['lab_nodes']

    # ──────────────────────────────────────────────────────────────
    # 2. Gather Ollama model list
    # ──────────────────────────────────────────────────────────────
    - name: Check if Ollama is installed
      ansible.builtin.command: which ollama
      register: ollama_check
      changed_when: false
      ignore_errors: true
      when: inventory_hostname in groups['lab_nodes']

    - name: List Ollama models
      ansible.builtin.command: ollama list --format json
      register: ollama_models_json
      changed_when: false
      ignore_errors: true
      when: inventory_hostname in groups['lab_nodes'] and ollama_check.rc == 0

    # ──────────────────────────────────────────────────────────────
    # 3. Gather memory info via free
    # ──────────────────────────────────────────────────────────────
    - name: Get memory info
      ansible.builtin.command: free -g
      register: free_output
      changed_when: false
      when: inventory_hostname in groups['lab_nodes']

    # ──────────────────────────────────────────────────────────────
    # 4. Gather disk info
    # ──────────────────────────────────────────────────────────────
    - name: Get disk free space (GB)
      ansible.builtin.shell: df -BG / | tail -1 | awk '{print $4}' | tr -d 'G'
      register: disk_free
      changed_when: false
      when: inventory_hostname in groups['lab_nodes']

    # ──────────────────────────────────────────────────────────────
    # 5. Gather CPU model
    # ──────────────────────────────────────────────────────────────
    - name: Get CPU model
      ansible.builtin.shell: cat /proc/cpuinfo | grep 'model name' | head -1 | cut -d':' -f2 | xargs
      register: cpu_model
      changed_when: false
      when: inventory_hostname in groups['lab_nodes']

    # ──────────────────────────────────────────────────────────────
    # 6. Parse Ollama models into list
    # ──────────────────────────────────────────────────────────────
    - name: Parse Ollama models
      ansible.builtin.set_fact:
        existing_models: "{{ (ollama_models_json.stdout | from_json).models | default([]) | map(attribute='name') | list }}"
      when: inventory_hostname in groups['lab_nodes'] and ollama_check.rc == 0

    - name: Default empty models
      ansible.builtin.set_fact:
        existing_models: []
      when: inventory_hostname in groups['lab_nodes'] and (ollama_check.rc != 0 or not existing_models)

    # ──────────────────────────────────────────────────────────────
    # 7. Parse memory info
    # ──────────────────────────────────────────────────────────────
    - name: Parse memory total GB
      ansible.builtin.set_fact:
        memory_total_gb: "{{ (free_output.stdout_lines[1].split()[1] | int) }}"
      when: inventory_hostname in groups['lab_nodes']

    - name: Parse memory available GB
      ansible.builtin.set_fact:
        memory_available_gb: "{{ (free_output.stdout_lines[1].split()[-1] | int) }}"
      when: inventory_hostname in groups['lab_nodes']

    # ──────────────────────────────────────────────────────────────
    # 8. Determine tier
    # ──────────────────────────────────────────────────────────────
    - name: Determine node tier
      ansible.builtin.set_fact:
        node_tier: "{{ 1 if (memory_total_gb | int) >= 30 and (ansible_processor_cores | int) >= 10 else 2 }}"
      when: inventory_hostname in groups['lab_nodes']

    # ──────────────────────────────────────────────────────────────
    # 9. Build per-node report
    # ──────────────────────────────────────────────────────────────
    - name: Build node entry
      ansible.builtin.set_fact:
        node_entry:
          node: "{{ inventory_hostname }}"
          role: "{{ 'orchestrator' if inventory_hostname in groups['orchestrator'] else 'lab_node' }}"
          tier: "{{ node_tier | default(2) }}"
          memory_total_gb: "{{ memory_total_gb | default(ansible_memtotal_mb // 1024) }}"
          memory_available_gb: "{{ memory_available_gb | default(ansible_memfree_mb // 1024) }}"
          cpu_cores: "{{ ansible_processor_cores | default(ansible_processor_vcpus | default(1)) }}"
          cpu_model: "{{ cpu_model.stdout | default(ansible_processor[0] | default('Unknown')) }}"
          disk_free_gb: "{{ disk_free.stdout | default(0) }}"
          os: "{{ ansible_system | default('Unknown') }}"
          dist_name: "{{ ansible_distribution | default('Unknown') }}"
          dist_version: "{{ ansible_distribution_version | default('Unknown') }}"
          dist_codename: "{{ ansible_distribution_release | default('Unknown') }}"
          existing_models: "{{ existing_models | default([]) }}"

    # ──────────────────────────────────────────────────────────────
    # 10. Collect all node entries
    # ──────────────────────────────────────────────────────────────
    - name: Add to node list
      ansible.builtin.set_fact:
        all_nodes: "{{ (hostvars['localhost']['all_nodes'] | default([])) + [hostvars[inventory_hostname]['node_entry']] }}"
      delegate_to: localhost
      delegate_facts: true
      when: inventory_hostname in groups['lab_nodes']

    # ──────────────────────────────────────────────────────────────
    # Mac Orchestrator special handling
    # ──────────────────────────────────────────────────────────────
    - name: Build orchestrator entry
      ansible.builtin.set_fact:
        node_entry:
          node: "{{ ansible_hostname }}"
          role: "orchestrator"
          tier: "{{ node_tier | default(2) }}"
          memory_total_gb: "{{ ansible_memtotal_mb // 1024 }}"
          memory_available_gb: "{{ ansible_memfree_mb // 1024 }}"
          cpu_cores: "{{ ansible_processor_cores | default(ansible_processor_vcpus | default(1)) }}"
          cpu_model: "{{ ansible_processor[0] | default('Unknown') }}"
          disk_free_gb: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first | default(0) | int) // 1073741824 }}"
          os: "{{ ansible_system | default('Unknown') }}"
          dist_name: "{{ ansible_distribution | default('Unknown') }}"
          dist_version: "{{ ansible_distribution_version | default('Unknown') }}"
          dist_codename: "{{ ansible_distribution_release | default('Unknown') }}"
          existing_models: "{{ existing_models | default([]) }}"
      when: inventory_hostname in groups['orchestrator']

    - name: Add orchestrator to node list
      ansible.builtin.set_fact:
        all_nodes: "{{ (hostvars['localhost']['all_nodes'] | default([])) + [node_entry] }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true
      when: inventory_hostname in groups['orchestrator']

# ──────────────────────────────────────────────────────────────────
# FINAL REPORT GENERATION
# ──────────────────────────────────────────────────────────────────
- name: Generate Final Report
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    - name: Build summary
      ansible.builtin.set_fact:
        report:
          timestamp: "{{ ansible_date_time.iso8601 }}"
          nodes: "{{ hostvars['localhost']['all_nodes'] | default([]) }}"
          summary:
            total_nodes: "{{ (hostvars['localhost']['all_nodes'] | default([])) | length }}"
            tier1_heavy_inference: "{{ (hostvars['localhost']['all_nodes'] | default([])) | selectattr('tier', 'defined') | selectattr('tier', 'equalto', 1) | map(attribute='node') | list }}"
            tier2_general_purpose: "{{ (hostvars['localhost']['all_nodes'] | default([])) | selectattr('tier', 'defined') | selectattr('tier', 'equalto', 2) | map(attribute='node') | list }}"
            aggregate_ram_gb: "{{ (hostvars['localhost']['all_nodes'] | default([])) | map(attribute='memory_total_gb') | map('int') | sum }}"
            aggregate_disk_free_gb: "{{ (hostvars['localhost']['all_nodes'] | default([])) | map(attribute='disk_free_gb') | map('int') | sum }}"
            network_saturation_detected: "{{ ((hostvars['localhost']['all_nodes'] | default([])) | selectattr('memory_total_gb', 'defined') | map(attribute='memory_total_gb') | map('int') | sum) >= 100 }}"
            recommended_depot_node: "{{ (hostvars['localhost']['all_nodes'] | default([])) | selectattr('tier', 'defined') | selectattr('tier', 'equalto', 1) | sort(attribute='memory_available_gb') | last | map(attribute='node') | first | default('fnet3') }}"
            os_standardization:
              target_dist: "Ubuntu"
              target_version: "24.04"
              target_codename: "noble"
              nodes_on_target: "{{ (hostvars['localhost']['all_nodes'] | default([])) | selectattr('dist_version', 'defined') | selectattr('dist_version', 'match', '^24\\.') | map(attribute='node') | list }}"
              nodes_needing_upgrade: "{{ (hostvars['localhost']['all_nodes'] | default([])) | selectattr('dist_version', 'defined') | selectattr('dist_version', 'match', '^20\\.') | map(attribute='node') | list }}"
              nodes_on_intermediate: "{{ (hostvars['localhost']['all_nodes'] | default([])) | selectattr('dist_version', 'defined') | selectattr('dist_version', 'match', '^22\\.') | map(attribute='node') | list }}"
              nodes_on_unsupported: "{{ (hostvars['localhost']['all_nodes'] | default([])) | selectattr('dist_version', 'defined') | selectattr('dist_version', 'match', '^26\\.') | map(attribute='node') | list }}"
              priority: "URGENT: Ubuntu 20.04 (focal) reaches EOL April 2025"

    - name: Write report to JSON file
      ansible.builtin.copy:
        content: "{{ report | to_nice_json }}"
        dest: "{{ playbook_dir }}/../lab-specs/lab-capacity-report.json"
        mode: '0644'
      run_once: true

    - name: Display success
      ansible.builtin.debug:
        msg:
          - "✓ Lab capacity report generated successfully"
          - "  Location: technical-infrastructure/lab-specs/lab-capacity-report.json"
          - "  Total nodes: {{ report.summary.total_nodes }}"
          - "  Aggregate RAM: {{ report.summary.aggregate_ram_gb }} GB"
          - "  Aggregate Disk: {{ report.summary.aggregate_disk_free_gb }} GB"
