---
# Fix Pi Availability Playbook
# Fixes PATH and startup configuration for nodes where pi is not available after reboot

- name: Fix Pi Availability Issues
  hosts: lab_nodes
  gather_facts: yes
  serial: 2
  
  tasks:
    - name: Check SSH connectivity
      wait_for_connection:
        timeout: 30
      failed_when: false
      register: ssh_check

    - name: Test pi availability
      shell: |
        source ~/.bashrc
        pi --version
      register: pi_test
      failed_when: false
      changed_when: false
      when: ssh_check.success

    - name: Find pi installation location
      command: which pi
      register: pi_location
      failed_when: false
      changed_when: false
      when: ssh_check.success

    - name: Find npm global prefix
      command: npm config get prefix
      register: npm_prefix
      failed_when: false
      changed_when: false
      when: ssh_check.success

    - name: Report findings
      debug:
        msg: |
          🔍 {{ inventory_hostname }}
             Pi location: {{ pi_location.stdout | default('NOT FOUND') }}
             NPM prefix: {{ npm_prefix.stdout | default('NOT FOUND') }}
             Pi test: {{ 'WORKS' if pi_test.rc == 0 else 'FAILED' }}
      when: ssh_check.success

    - name: Fix bashrc PATH
      blockinfile:
        path: /home/friasc/.bashrc
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Pi PATH"
        block: |
          # Pi PATH configuration
          export PATH="/usr/local/bin:$HOME/.npm-global/bin:$PATH"
        create: yes
        owner: friasc
        group: friasc
      when: ssh_check.success

    - name: Fix profile PATH
      blockinfile:
        path: /home/friasc/.profile
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Pi PATH"
        block: |
          # Pi PATH configuration
          export PATH="/usr/local/bin:$HOME/.npm-global/bin:$PATH"
        create: yes
        owner: friasc
        group: friasc
      when: ssh_check.success

    - name: Create bash_profile if missing
      copy:
        dest: /home/friasc/.bash_profile
        content: |
          # Pi startup configuration
          if [ -f ~/.bashrc ]; then
            . ~/.bashrc
          fi
        owner: friasc
        group: friasc
        mode: '0644'
        force: no
      when: ssh_check.success

    - name: Verify pi works after fix
      shell: |
        source ~/.bashrc
        pi --version
      register: pi_after_fix
      failed_when: false
      changed_when: false
      when: ssh_check.success

    - name: Report fix results
      debug:
        msg: |
          {{ '✅' if pi_after_fix.rc == 0 else '❌' }} {{ inventory_hostname }}
             Status: {{ 'FIXED' if pi_after_fix.rc == 0 else 'STILL BROKEN' }}
             Pi version: {{ pi_after_fix.stdout | default('N/A') }}
      when: ssh_check.success
