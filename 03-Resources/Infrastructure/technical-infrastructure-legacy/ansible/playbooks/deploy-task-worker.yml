---
# Playbook: Deploy Task Worker to Lab Nodes
# Purpose: Install a lightweight task listener that receives work from the orchestrator
# and executes it via the local Ollama API.

- name: Deploy Task Worker to Lab Nodes
  hosts: lab_nodes
  gather_facts: no
  become: yes
  strategy: free

  tasks:
    - name: Ensure task directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      loop:
        - /srv/lab-worker/pending
        - /srv/lab-worker/running
        - /srv/lab-worker/results
        - /srv/lab-worker/logs

    - name: Deploy task worker script
      ansible.builtin.copy:
        src: task-worker.sh
        dest: /usr/local/bin/task-worker
        owner: root
        group: root
        mode: '0755'

    - name: Create task worker systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/task-worker.service
        content: |
          [Unit]
          Description=Lab Node Task Worker
          After=network-online.target

          [Service]
          Type=simple
          User={{ ansible_user }}
          Group={{ ansible_user }}
          ExecStart=/usr/local/bin/task-worker
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd

    - name: Enable and start task worker
      ansible.builtin.systemd:
        name: task-worker
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Verify task worker is running
      ansible.builtin.systemd:
        name: task-worker
        state: started
      register: worker_status
      changed_when: false

    - name: Report status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: task-worker service {{ 'running' if worker_status.status.ActiveState == 'active' else 'not running' }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
