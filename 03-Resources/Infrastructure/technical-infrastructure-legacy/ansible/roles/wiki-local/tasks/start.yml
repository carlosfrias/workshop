---
- name: "[TI-WIKI] Ensure wiki/index.md exists"
  ansible.builtin.stat:
    path: "{{ wiki_content_dir }}/index.md"
  register: _wiki_index_stat

- name: "[TI-WIKI] Fail if wiki/index.md is missing"
  ansible.builtin.fail:
    msg: |
      wiki/index.md is missing. This file is the VitePress home page.
      Create it at: {{ wiki_content_dir }}/index.md
  when: not _wiki_index_stat.stat.exists

- name: "[TI-WIKI] Ensure subdirectory index.md symlinks exist"
  ansible.builtin.file:
    src: "{{ wiki_content_dir }}/{{ item }}/README.md"
    dest: "{{ wiki_content_dir }}/{{ item }}/index.md"
    state: link
    force: true
  loop: "{{ wiki_subdirs_with_readme }}"

- name: "[TI-WIKI] Install Mermaid diagram plugin"
  ansible.builtin.command: npm install vitepress-plugin-mermaid mermaid --save-dev
  args:
    chdir: "{{ wiki_root }}"
  register: _mermaid_install
  changed_when: "'added' in _mermaid_install.stdout or 'changed' in _mermaid_install.stdout"

- name: "[TI-WIKI] Verify Mermaid plugin installed"
  ansible.builtin.command: npm list mermaid vitepress-plugin-mermaid
  args:
    chdir: "{{ wiki_root }}"
  changed_when: false
  register: _mermaid_check

- name: "[TI-WIKI] Report Mermaid plugin status"
  ansible.builtin.debug:
    msg: "✅ Mermaid diagrams enabled: {{ _mermaid_check.stdout_lines[1] | trim }}"
  when: _mermaid_check.rc == 0

- name: "[TI-WIKI] Ensure .vitepress/config.js exists with Mermaid support"
  ansible.builtin.stat:
    path: "{{ wiki_root }}/.vitepress/config.js"
  register: _config_js_stat

- name: "[TI-WIKI] Fail if config.js is missing"
  ansible.builtin.fail:
    msg: |
      .vitepress/config.js is missing. This is the VitePress configuration file.
      Expected at: {{ wiki_root }}/.vitepress/config.js
  when: not _config_js_stat.stat.exists

- name: "[TI-WIKI] Ensure .vitepress/config.mjs symlink exists (for legacy compatibility)"
  ansible.builtin.file:
    src: "{{ wiki_root }}/.vitepress/config.js"
    dest: "{{ wiki_root }}/.vitepress/config.mjs"
    state: link
    force: true
  when: _config_js_stat.stat.exists

- name: "[TI-WIKI] Check if VitePress cache exists"
  ansible.builtin.stat:
    path: "{{ wiki_root }}/.vitepress/cache"
  register: _cache_stat

- name: "[TI-WIKI] Clear stale VitePress cache"
  ansible.builtin.file:
    path: "{{ wiki_root }}/.vitepress/cache"
    state: absent
  when: _cache_stat.stat.exists

- name: "[TI-WIKI] Start VitePress dev server in background"
  ansible.builtin.shell: |
    cd {{ wiki_root }}
    nohup node node_modules/vitepress/bin/vitepress.js dev --host --port {{ vitepress_port }} > {{ wiki_log_file }} 2>&1 &
  args:
    executable: /bin/bash
  register: _vp_started
  changed_when: _vp_started.rc == 0

- name: "[TI-WIKI] Wait for VitePress to respond"
  ansible.builtin.shell: |
    curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ vitepress_port }}/ | grep -q "200"
  register: _curl_result
  until: _curl_result.rc == 0
  retries: 15
  delay: 2

- name: "[TI-WIKI] Report started"
  ansible.builtin.debug:
    msg:
      - "✅ Trading Desk Wiki is running"
      - "   URL:    http://localhost:{{ vitepress_port }}/"
      - "   Log:    {{ wiki_log_file }}"
      - "   Root:   {{ wiki_root }}"
      - "   Config: {{ wiki_root }}/.vitepress/config.js"

- name: "[TI-WIKI] Open default browser to wiki URL"
  ansible.builtin.command: "open http://localhost:{{ vitepress_port }}/"
  changed_when: false
  when: 
    - ansible_os_family == 'Darwin'
    - open_browser | default(true) | bool
