---
# Stop the VitePress dev server.
# VitePress has no built-in 'stop' command — background Node processes are
# terminated by signal (SIGTERM/SIGKILL).  This is the standard mechanism for
# stopping dev servers launched with nohup.

- name: "[TI-WIKI] Graceful stop (SIGTERM)"
  ansible.builtin.shell: |
    PID="{{ _wiki_pid }}"
    if ps -p "$PID" > /dev/null 2>&1; then
      kill "$PID"
    fi
  when: _wiki_server_up | bool

- name: "[TI-WIKI] Wait for process to exit (up to 5s)"
  ansible.builtin.shell: |
    for i in 1 2 3 4 5; do
      sleep 1
      if ! ps -p "{{ _wiki_pid }}" > /dev/null 2>&1; then
        echo "EXITED"
        exit 0
      fi
    done
    echo "STILL_RUNNING"
  when: _wiki_server_up | bool
  changed_when: false
  register: _graceful_result

- name: "[TI-WIKI] Force kill (SIGKILL) if still alive"
  ansible.builtin.shell: |
    PID="{{ _wiki_pid }}"
    if ps -p "$PID" > /dev/null 2>&1; then
      kill -9 "$PID"
      sleep 1
    fi
  when: _wiki_server_up | bool and _graceful_result.stdout != "EXITED"

- name: "[TI-WIKI] Confirm port is free"
  ansible.builtin.shell: |
    if lsof -i :{{ vitepress_port }} | grep -q LISTEN; then
      echo "PORT_STILL_OPEN"
      exit 1
    else
      echo "PORT_FREED"
    fi
  changed_when: false

- name: "[TI-WIKI] Report stopped"
  ansible.builtin.debug:
    msg:
      - "🛑 Wiki server stopped"
      - "   Port {{ vitepress_port }} is free"
      - "   Graceful exit: {{ 'yes' if (_graceful_result.stdout | default('')) == 'EXITED' else 'no (SIGKILL used)' }}"
  when: _wiki_server_up | bool

- name: "[TI-WIKI] Report already stopped"
  ansible.builtin.debug:
    msg:
      - "ℹ️  Wiki server is already stopped"
      - "   Nothing on port {{ vitepress_port }}"
  when: not (_wiki_server_up | bool)
