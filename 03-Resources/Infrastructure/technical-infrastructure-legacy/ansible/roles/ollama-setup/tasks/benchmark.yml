---
# benchmark.yml — Optional performance verification

- name: "Benchmark | Copy benchmark script to node"
  ansible.builtin.copy:
    src: "../../scripts/ollama-benchmark.sh"
    dest: /tmp/ollama-benchmark.sh
    mode: '0755'

- name: "Benchmark | Run benchmark for each model"
  ansible.builtin.command: |
    bash /tmp/ollama-benchmark.sh localhost {{ item }} 128
  register: benchmark_result
  changed_when: false
  loop: "{{ _models }}"
  ignore_errors: true

- name: "Benchmark | Aggregate results"
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} | {{ item.item }} | {{ item.stdout }}"
  loop: "{{ benchmark_result.results }}"
  when: item.rc == 0
