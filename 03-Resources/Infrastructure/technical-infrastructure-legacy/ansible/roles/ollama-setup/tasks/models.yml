---
# models.yml — Per-model deployment via direct pull (idempotent)
# Depot sync is handled by manual scripts; Ansible uses direct pulls
# with creates: to skip already-present models.

- name: "Models | Pull required models (idempotent via creates)"
  ansible.builtin.command: |
    ollama pull {{ item }}
  args:
    creates: "/usr/share/ollama/.ollama/models/manifests/registry.ollama.ai/library/{{ item | split(':') | first }}/{{ item | split(':') | last }}"
  loop: "{{ _models }}"
  register: model_pull
  retries: 2
  delay: 30
  until: model_pull.rc == 0
  environment:
    OLLAMA_NUM_PARALLEL: "1"
  changed_when: model_pull.rc == 0
  tags: [ollama_pull]

- name: "Models | Verify API sees pulled models"
  ansible.builtin.uri:
    url: http://localhost:11434/api/tags
    method: GET
    status_code: 200
  register: api_check
  retries: 5
  delay: 3
  until: api_check.status == 200

- name: "Models | Log deployed models"
  ansible.builtin.debug:
    msg: "Node {{ inventory_hostname }} has {{ api_check.json.models | default([]) | length }} models visible via API"
