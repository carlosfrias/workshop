---
- name: "WireGuard Client | Ensure WireGuard packages installed"
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: "WireGuard Client | Ensure /etc/wireguard exists"
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: '0700'

- name: "WireGuard Client | Generate client keys if absent"
  ansible.builtin.shell: |
    wg genkey | tee {{ wg_client_private_key_file }} | wg pubkey > {{ wg_client_public_key_file }}
  args:
    creates: "{{ wg_client_private_key_file }}"
  register: wg_client_keygen

- name: "WireGuard Client | Read client private key"
  ansible.builtin.command: "cat {{ wg_client_private_key_file }}"
  register: wg_client_privkey_content
  changed_when: false
  check_mode: false

- name: "WireGuard Client | Deploy client wg0.conf"
  ansible.builtin.template:
    src: client.conf.j2
    dest: "/etc/wireguard/{{ wg_interface }}.conf"
    mode: '0600'
    owner: root
    group: root
  notify: Restart wg-quick-client

- name: "WireGuard Client | Ensure wg-quick service enabled and started"
  ansible.builtin.systemd:
    name: "wg-quick@{{ wg_interface }}"
    enabled: true
    state: started
