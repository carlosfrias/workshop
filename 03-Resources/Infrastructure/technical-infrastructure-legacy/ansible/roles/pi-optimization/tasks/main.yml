---
# Pi Optimization and Model Routing Role

- name: Install Project Blueprint and dependencies
  block:
    - name: Install project-blueprint skill
      shell: |
        source ~/.bashrc
        pi install github:carlosfrias/project-blueprint
      register: blueprint_install
      failed_when: false

- name: Run Local Model Router
  block:
    - name: Execute local-model-router
      shell: |
        . ~/.bashrc
        pi local-model-router
      register: router_output
      changed_when: false

- name: Remove all existing Ollama models
  shell: |
    ollama list | grep -v 'NAME' | awk '{print $1}' | xargs -I {} ollama rm {}
  register: model_cleanup
  changed_when: model_cleanup.rc == 0
  failed_when: false

- name: Capture Node Capacity Metrics
  block:
    - name: Get CPU Info
      shell: "lscpu | grep 'Model name' | cut -d: -f2"
      register: cpu_info
      changed_when: false

    - name: Get RAM Info
      shell: "free -h | grep Mem | awk '{print $2}'"
      register: ram_info
      changed_when: false

    - name: Get GPU Info
      shell: "nvidia-smi --query-gpu=name,memory.total --format=csv,noheader || echo 'No NVIDIA GPU'"
      register: gpu_info
      changed_when: false

    - name: Get MAC Address
      shell: "cat /sys/class/net/$(ip route | grep default | awk '{print $5}')/address"
      register: mac_info
      changed_when: false

- name: Save Findings to Local File
  copy:
    dest: "/home/friasc/pi_node_report.json"
    content: |
      {
        "hostname": "{{ ansible_hostname }}",
        "ip": "{{ ansible_host }}",
        "mac": "{{ mac_info.stdout | trim }}",
        "pi_version": "{{ pi_version }}",
        "capacity": {
          "cpu": "{{ cpu_info.stdout | trim }}",
          "ram": "{{ ram_info.stdout | trim }}",
          "gpu": "{{ gpu_info.stdout | trim }}"
        },
        "model_router": {{ router_output.stdout | default('{}') }}
      }
    owner: friasc
    group: friasc
    mode: '0644'
