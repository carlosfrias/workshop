---
# Default variables for wireguard-server

# VPN subnet
wg_interface: "wg0"
wg_port: 51820
wg_subnet: "10.200.200.0/24"
wg_server_ip: "10.200.200.1/24"

# Server key paths (relative to playbook or absolute)
wg_server_private_key_file: "{{ playbook_dir }}/../vpn-keys/server.private.key"
wg_server_public_key_file: "{{ playbook_dir }}/../vpn-keys/server.public.key"

# Interface to masquerade NAT through (detected if not specified)
# e.g., "enp8s0", "eth0", etc.
wg_nat_interface: ""

# Peers — list of client public keys to allow
wg_peers: []
# Example:
# wg_peers:
#   - name: orchestrator
#     public_key: "..."
#     allowed_ips: "10.200.200.2/32"

# Optional DNS for VPN clients
wg_dns: "192.168.0.1"

# Keepalive (seconds)
wg_persistent_keepalive: 25

# MTU
wg_mtu: 1420
