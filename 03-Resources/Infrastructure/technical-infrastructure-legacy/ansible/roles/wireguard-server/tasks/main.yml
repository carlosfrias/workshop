---
- name: "WireGuard Server | Ensure WireGuard packages installed"
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: "WireGuard Server | Detect NAT interface if not specified"
  ansible.builtin.set_fact:
    wg_nat_interface: "{{ ansible_default_ipv4.interface }}"
  when: wg_nat_interface | length == 0

- name: "WireGuard Server | Ensure /etc/wireguard exists"
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: '0700'

- name: "WireGuard Server | Generate server keys if absent"
  ansible.builtin.shell: |
    wg genkey | tee {{ wg_server_private_key_file | default('/etc/wireguard/server.private.key') }} | wg pubkey > {{ wg_server_public_key_file | default('/etc/wireguard/server.public.key') }}
  args:
    creates: "{{ wg_server_private_key_file | default('/etc/wireguard/server_private.key') }}"
  register: wg_keygen

- name: "WireGuard Server | Read server private key"
  ansible.builtin.command: "cat {{ wg_server_private_key_file }}"
  register: wg_server_privkey_content
  changed_when: false
  check_mode: false

- name: "WireGuard Server | Read server public key"
  ansible.builtin.command: "cat {{ wg_server_public_key_file }}"
  register: wg_server_pubkey_content
  changed_when: false
  check_mode: false

- name: "WireGuard Server | Enable IP forwarding"
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    sysctl_set: true

- name: "WireGuard Server | Deploy wg0.conf from template"
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "/etc/wireguard/{{ wg_interface }}.conf"
    mode: '0600'
    owner: root
    group: root
  notify: Restart wg-quick

- name: "WireGuard Server | Ensure wg-quick service enabled and started"
  ansible.builtin.systemd:
    name: "wg-quick@{{ wg_interface }}"
    enabled: true
    state: started

- name: "WireGuard Server | Allow UDP port in UFW (if active)"
  ansible.builtin.ufw:
    rule: allow
    port: "{{ wg_port }}"
    proto: udp
  when: ansible_facts['ansible_local'] is defined and ansible_facts['ansible_local'].ufw is defined
  ignore_errors: true
