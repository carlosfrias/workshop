# Trading Lab Inventory
# All 8 computing nodes (1 orchestrator + 7 lab nodes)

[orchestrator]
localhost ansible_host=127.0.0.1 ansible_connection=local ansible_user=friasc

[lab_nodes]
fnet1 ansible_host=192.168.0.141 ansible_user=friasc ansible_become=true ansible_become_method=sudo
fnet2 ansible_host=192.168.0.142 ansible_user=friasc ansible_become=true ansible_become_method=sudo
fnet3 ansible_host=192.168.0.143 ansible_user=friasc ansible_become=true ansible_become_method=sudo
fnet4 ansible_host=192.168.0.144 ansible_user=friasc ansible_become=true ansible_become_method=sudo
fnet5 ansible_host=192.168.0.145 ansible_user=friasc ansible_become=true ansible_become_method=sudo
fnet6 ansible_host=192.168.0.146 ansible_user=friasc ansible_become=true ansible_become_method=sudo
fnet7 ansible_host=192.168.0.147 ansible_user=friasc ansible_become=true ansible_become_method=sudo

[lab_nodes:vars]
ansible_python_interpreter=/usr/bin/python3

[all:vars]
ansible_ssh_common_args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
