---
# Start pi + coms-net agents on all lab nodes via systemd
#
# Replaces the old nohup-based start-agents.yml with proper systemd units.
# Each node gets a pi-cross-node-agent@<hostname>.service that survives
# crashes and reboots.
#
# Prerequisites: deploy-fleet.yml or standup-fleet.yml Phases 1-4 must be complete.
#
# Usage:
#   cd workspace/01-Projects/pi-cross-node-comms/ansible
#   ansible-playbook -i inventory.yml start-agents.yml

- name: Start coms-net Agents on Lab Nodes (systemd)
  hosts: lab_nodes
  gather_facts: yes
  strategy: free

  vars:
    hub_url: "http://192.168.0.142:8080"
    coms_token: "{{ (lookup('env', 'PI_COMS_NET_AUTH_TOKEN') | default('', true)) or '7e095b8e0b5d8bc44feea4da24e989fcf92b9341b5db8ed9604f05c412f386a0' }}"
    hub_project: "default"
    extension_path: "{{ ansible_env.HOME }}/pi-cross-node-comms"
    systemd_src: "{{ playbook_dir }}/systemd"

  tasks:
    # ── Stop legacy nohup agents (migration path) ──
    - name: Kill any nohup-launched agent
      ansible.builtin.shell: |
        pkill -f "pi -e.*coms-net" 2>/dev/null || true
        pkill -f "pi.*--name.*{{ inventory_hostname }}" 2>/dev/null || true
        rm -f /tmp/pi-agent-{{ inventory_hostname }}.pid
        true
      changed_when: false
      failed_when: false

    # ── Stop existing systemd service (for clean restart) ──
    - name: Stop existing systemd service
      ansible.builtin.systemd:
        name: "pi-cross-node-agent@{{ inventory_hostname }}"
        state: stopped
      ignore_errors: yes
      changed_when: false

    # ── Install systemd unit from template ──
    - name: Install systemd unit
      ansible.builtin.template:
        src: "{{ systemd_src }}/pi-cross-node-agent@.service.template"
        dest: "/etc/systemd/system/pi-cross-node-agent@{{ inventory_hostname }}.service"
        mode: '0644'
      become: yes

    # ── Install per-node environment file (secure) ──
    - name: Install per-node environment file
      ansible.builtin.template:
        src: "{{ systemd_src }}/pi-cross-node-agent.conf"
        dest: "/etc/pi-cross-node-agent@{{ inventory_hostname }}.conf"
        mode: '0600'
        owner: root
        group: root
      become: yes

    # ── Reload and start ──
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes
      become: yes

    - name: Enable and start pi-cross-node-agent service
      ansible.builtin.systemd:
        name: "pi-cross-node-agent@{{ inventory_hostname }}"
        enabled: yes
        state: started
      become: yes

    - name: Wait for service to be active
      ansible.builtin.systemd:
        name: "pi-cross-node-agent@{{ inventory_hostname }}"
      register: svc_status
      until: svc_status.status.ActiveState == 'active'
      retries: 5
      delay: 3

    - name: Report agent status
      ansible.builtin.debug:
        msg: "🚀 {{ inventory_hostname }} — pi-cross-node-agent@{{ inventory_hostname }} {{ svc_status.status.ActiveState }}"

- name: Wait for all agents to register on hub
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    coms_token: "{{ (lookup('env', 'PI_COMS_NET_AUTH_TOKEN') | default('', true)) or '7e095b8e0b5d8bc44feea4da24e989fcf92b9341b5db8ed9604f05c412f386a0' }}"
    hub_url: "http://192.168.0.142:8080"

  tasks:
    - name: Wait for agents to appear on hub
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          count=$(curl -sf -H "Authorization: Bearer {{ coms_token }}" "{{ hub_url }}/v1/agents?project=default" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('agents',[])))" 2>/dev/null || echo 0)
          if [ "$count" -ge 1 ]; then
            echo "Agents registered: $count"
            exit 0
          fi
          sleep 3
        done
        echo "No agents registered after 90 seconds"
        exit 1
      register: agent_wait
      changed_when: false

    - name: Report fleet status
      ansible.builtin.debug:
        msg: "═══════════════════════════════════════════════════\n  FLEET ONLINE — {{ agent_wait.stdout }}\n  Hub: {{ hub_url }}\n═══════════════════════════════════════════════════"