# pi-cross-node-agent environment file
# Deploy to: /etc/pi-cross-node-agent.conf
# Per-instance overrides: /etc/pi-cross-node-agent@<hostname>.conf
#
# This file is read by the systemd unit template pi-cross-node-agent@.service
# Values here are used as defaults; per-instance files take precedence.
#
# SECURITY: This file contains the auth token in plaintext.
# Set permissions: chmod 600 /etc/pi-cross-node-agent.conf
# Owner: root:root

# ── Required ──────────────────────────────────────────────────────────────

# coms-net hub URL (include scheme and port)
HUB_URL=http://192.168.0.142:8080

# coms-net auth token (shared across the lab project)
COMS_TOKEN=7e095b8e0b5d8bc44feea4da24e989fcf92b9341b5db8ed9604f05c412f386a0

# coms-net project namespace
HUB_PROJECT=lab

# ── Paths ──────────────────────────────────────────────────────────────────

# Absolute path to the pi-cross-node-comms extension directory on this node
# (Deployed by Ansible — standup-fleet.yml Phase 4)
EXTENSION_PATH=/home/friasc/pi-cross-node-comms