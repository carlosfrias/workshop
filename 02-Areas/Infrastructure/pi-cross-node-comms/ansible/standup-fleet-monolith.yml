---
# Standup Fleet — Full coms-net Hub + Lab Readiness Playbook
#
# Single-playbook orchestrator that:
#   Phase 0: NFS mount — orchestrator shared workspace on all lab nodes
#   Phase 1: Docker-deploys and starts the coms-net hub server on fnet2
#   Phase 2: Ensures pi is installed and current on every lab node (nvm + Node v24.15)
#   Phase 3: LVM expansion + Ollama installation + model pulls on every lab node
#   Phase 4: Deploys the coms-net extension to every lab node
#   Phase 5: Starts pi agents on every lab node, registered with the hub
#   Phase 6: Validates fleet — prunes unreachable nodes, reports final status
#
# Run from the macOS orchestrator:
#   cd workshop/01-Projects/pi-cross-node-comms/ansible
#   ansible-playbook -i inventory.yml standup-fleet.yml
#
# Env vars:
#   PI_COMS_NET_AUTH_TOKEN — auth token (default: shared lab token)
#
# Down-node handling:
#   - Nodes that fail SSH or any health task are added to the `down_nodes` group
#   - Down nodes are removed from hub registration (deleted from /v1/agents)
#   - Down nodes are skipped in subsequent phases
#   - Nodes that come back up during the run are re-included automatically

- name: STANDUP FLEET
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Display banner
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════"
          - "  coms-net FLEET STANDUP"
          - "  Phase 0: NFS Mount (orchestrator workspace share)"
          - "  Phase 1: Hub Server (fnet2) [Docker]"
          - "  Phase 2: pi Agent (all nodes) [nvm + Node v24.15]"
          - "  Phase 3: LVM Expansion + Ollama + Models (all nodes)"
          - "  Phase 4: Extension Deploy (all nodes)"
          - "  Phase 5: Agent Launch (all nodes)"
          - "  Phase 6: Fleet Validation + Prune"
          - "═══════════════════════════════════════════════════"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 0: NFS Mount — Orchestrator Shared Workspace
# ══════════════════════════════════════════════════════════════════════════════

- name: PHASE 0 - NFS Mount (Orchestrator Shared Workspace)
  hosts: lab_nodes
  gather_facts: yes
  strategy: free

  vars:
    nfs_server: "192.168.0.154"
    nfs_export: "/Users/friasc/Cloud/carlos-desktop"
    mount_point: "/mnt/carlos-desktop"
    mount_options: "vers=3,rw,soft,_netdev"

  tasks:
    - name: Ensure nfs-common is installed
      ansible.builtin.apt:
        name: nfs-common
        state: present
      become: yes

    - name: Create mount point
      ansible.builtin.file:
        path: "{{ mount_point }}"
        state: directory
        mode: '0755'
      become: yes

    - name: Add NFS mount to fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "{{ nfs_server }}:{{ nfs_export }} {{ mount_point }} nfs {{ mount_options }} 0 0"
        regexp: "^{{ nfs_server }}:{{ nfs_export }}\\s+{{ mount_point }}\\s+nfs\\s+.*$"
        state: present
        create: yes
      become: yes

    - name: Mount NFS share
      ansible.builtin.shell: |
        if ! mountpoint -q {{ mount_point }} 2>/dev/null; then
          mount {{ mount_point }} 2>&1 || mount -t nfs -o {{ mount_options }} {{ nfs_server }}:{{ nfs_export }} {{ mount_point }} 2>&1
        fi
      register: mount_result
      changed_when: "'mounted' in mount_result.stdout or mount_result.rc == 0"

    - name: Verify NFS mount
      ansible.builtin.shell: mountpoint -q {{ mount_point }}
      register: mount_verify
      changed_when: false

    - name: Verify read access
      ansible.builtin.shell: ls {{ mount_point }}/workshop/ > /dev/null
      register: read_verify
      changed_when: false

    - name: Verify write access
      ansible.builtin.shell: |
        touch {{ mount_point }}/workshop/.nfs-verify-{{ inventory_hostname }} && \
        rm {{ mount_point }}/workshop/.nfs-verify-{{ inventory_hostname }}
      register: write_verify
      changed_when: false

    - name: Report NFS status
      ansible.builtin.debug:
        msg: >-
          {{ '✅' if mount_verify.rc == 0 else '❌' }}
          {{ inventory_hostname }} —
          NFS mounted at {{ mount_point }}
          (R{{ '✅' if read_verify.rc == 0 else '❌' }}
          W{{ '✅' if write_verify.rc == 0 else '❌' }})

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 1: Hub Server — fnet2 only
# ══════════════════════════════════════════════════════════════════════════════

- name: PHASE 1 - Hub Server on fnet2 (Docker)
  hosts: fnet2
  gather_facts: yes

  vars:
    hub_host: "0.0.0.0"
    hub_port: "8080"
    hub_project: "lab"
    coms_token: "{{ (lookup('env', 'PI_COMS_NET_AUTH_TOKEN') | default('', true)) or '7e095b8e0b5d8bc44feea4da24e989fcf92b9341b5db8ed9604f05c412f386a0' }}"
    extension_src: "{{ playbook_dir }}/../"
    deploy_dir: "{{ ansible_env.HOME }}/coms-net-hub"

  tasks:
    - name: Ensure Docker is installed
      ansible.builtin.shell: |
        if ! command -v docker >/dev/null 2>&1; then
          curl -fsSL https://get.docker.com | sh
          sudo usermod -aG docker $USER
        fi
      changed_when: true

    - name: Ensure Docker daemon is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes
      ignore_errors: yes

    - name: Create deployment directory
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: Create server subdirectory
      ansible.builtin.file:
        path: "{{ deploy_dir }}/server"
        state: directory
        mode: '0755'

    - name: Copy Docker assets
      ansible.builtin.copy:
        src: "{{ extension_src }}/{{ item }}"
        dest: "{{ deploy_dir }}/{{ item }}"
        mode: '0644'
      loop:
        - Dockerfile
        - docker-compose.yml
        - .dockerignore

    - name: Copy hub server source
      ansible.builtin.copy:
        src: "{{ extension_src }}/server/coms-net-server.ts"
        dest: "{{ deploy_dir }}/server/coms-net-server.ts"
        mode: '0644'

    - name: Kill any process using hub port (legacy Bun cleanup)
      ansible.builtin.shell: |
        pid=$(ss -tlnp 2>/dev/null | grep ":{{ hub_port }}" | grep -oP 'pid=\K[0-9]+' || true)
        [ -n "$pid" ] && sudo kill "$pid" 2>/dev/null || true
        true
      changed_when: false
      failed_when: false

    - name: Stop existing container
      ansible.builtin.shell: |
        cd {{ deploy_dir }}
        docker compose down --remove-orphans 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: Build and start hub via Docker Compose
      block:
        - name: Docker compose up
          ansible.builtin.shell: |
            cd {{ deploy_dir }}
            PI_COMS_NET_AUTH_TOKEN="{{ coms_token }}" \
            PI_COMS_NET_HOST="{{ hub_host }}" \
            PI_COMS_NET_PORT="{{ hub_port }}" \
            PI_COMS_NET_PROJECT="{{ hub_project }}" \
            docker compose up -d --build --force-recreate
          register: compose_up
          changed_when: true

        - name: Verify hub health
          ansible.builtin.uri:
            url: "http://localhost:{{ hub_port }}/health"
            status_code: 200
          register: hub_health
          retries: 10
          delay: 2
          until: hub_health.status == 200

        - name: Report hub ready
          ansible.builtin.debug:
            msg:
              - "✅ Hub running on fnet2 (192.168.0.142:{{ hub_port }}) [Docker]"
              - "   Container: coms-net-hub"
              - "   Server ID: {{ hub_health.json.server_id }}"
              - "   Image: coms-net-hub:latest"
      rescue:
        - name: Dump Docker logs for diagnostics
          ansible.builtin.shell: |
            cd {{ deploy_dir }}
            docker compose logs --tail=50 2>&1 || true
          changed_when: false
          failed_when: false

        - name: Check Docker is running
          ansible.builtin.command: docker info
          register: docker_info
          changed_when: false
          failed_when: false

        - name: Check container exists
          ansible.builtin.shell: |
            docker ps -a --filter name=coms-net-hub --format '{{ '{{' }}.Status{{ '}}' }}' 2>/dev/null || echo 'missing'
          register: container_status
          changed_when: false
          failed_when: false

        - name: Diagnostic report
          ansible.builtin.fail:
            msg:
              - "❌ Hub failed to start on fnet2 (Docker)"
              - "   Docker: {{ 'RUNNING' if docker_info.rc == 0 else 'NOT RUNNING' }}"
              - "   Container: {{ container_status.stdout }}"
              - "   Auth token: {{ 'SET' if coms_token else 'EMPTY' }}"
              - "   Docker logs above this message. Common fixes:"
              - "     1. Token empty → pass -e 'coms_token=<token>'"
              - "     2. Docker not installed → run: curl -fsSL https://get.docker.com | sh"
              - "     3. Port in use → check: docker ps / sudo ss -tlnp | grep {{ hub_port }}"
              - "     4. Manual rebuild: cd {{ deploy_dir }} && docker compose build --no-clean && docker compose up -d"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 2: pi Agent — all lab nodes (idempotent install/upgrade)
# ══════════════════════════════════════════════════════════════════════════════

- name: PHASE 2 - pi Availability on Lab Nodes
  hosts: lab_nodes
  gather_facts: yes
  strategy: free

  vars:
    pi_version_target: "0.77.0"
    nvm_version: "0.40.4"
    node_version: "24.15.0"
    nvm_install_url: "https://raw.githubusercontent.com/nvm-sh/nvm/v{{ nvm_version }}/install.sh"

  tasks:
    # ── Bashrc cleanup ──────────────────────────────────────────
    - name: Remove conflicting npm PATH lines from .bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        regexp: '^export PATH=.*npm.*prefix.*\$PATH$'
        state: absent

    - name: Remove stale .npm-global PATH from .bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        regexp: '^export PATH="\$HOME/\.npm-global/bin:\$HOME/\.local/bin:\$PATH"$'
        state: absent

    # ── nvm installation ────────────────────────────────────────
    - name: Check if nvm is installed
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        nvm --version
      args:
        executable: /bin/bash
      register: nvm_current
      ignore_errors: yes
      changed_when: false

    - name: Install nvm
      ansible.builtin.shell: curl -o- {{ nvm_install_url }} | bash
      args:
        executable: /bin/bash
      when: nvm_current.failed or (nvm_current.stdout | trim) != nvm_version
      changed_when: true

    - name: Ensure nvm lines in .bashrc
      ansible.builtin.blockinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        marker: "# {mark} nvm"
        block: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # This loads nvm bash_completion

    # ── Node.js via nvm ─────────────────────────────────────────
    - name: Check current default Node.js version
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        nvm current
      args:
        executable: /bin/bash
      register: node_current
      ignore_errors: yes
      changed_when: false

    - name: Install Node.js {{ node_version }} via nvm
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        nvm install {{ node_version }}
        nvm alias default {{ node_version }}
      args:
        executable: /bin/bash
      when: >
        node_current.failed or
        (node_current.stdout is defined and
         (node_current.stdout | regex_replace('^v', '')) != node_version)
      changed_when: true

    # ── Remove system NodeSource if present ─────────────────────
    - name: Check if NodeSource package is installed
      ansible.builtin.shell: dpkg -l nodejs 2>/dev/null | grep -q nodesource && echo "present" || echo "absent"
      register: nodesource_check
      changed_when: false

    - name: Remove system NodeSource package
      ansible.builtin.shell: |
        sudo apt-get remove -y nodejs
        sudo rm -f /etc/apt/sources.list.d/nodesource.sources /usr/share/keyrings/nodesource.gpg
        sudo apt-get autoremove -y
      when: nodesource_check.stdout | trim == "present"
      changed_when: true

    - name: Remove stale system-level npm global packages
      ansible.builtin.shell: |
        sudo rm -f /usr/local/bin/pi /usr/bin/pi
        sudo rm -rf /usr/lib/node_modules/@earendil-works /usr/lib/node_modules/@mariozechner /usr/lib/node_modules/pi-intercom
        sudo rm -rf /usr/local/lib/node_modules/@earendil-works /usr/local/lib/node_modules/@mariozechner /usr/local/lib/node_modules/pi-intercom
      changed_when: false
      failed_when: false

    # ── pi installation via nvm ─────────────────────────────────
    - name: Check current pi version
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        pi --version 2>&1
      args:
        executable: /bin/bash
      register: pi_current
      ignore_errors: yes
      changed_when: false

    - name: Install or upgrade pi
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        npm uninstall -g @mariozechner/pi-coding-agent 2>/dev/null || true
        npm install -g @earendil-works/pi-coding-agent
      args:
        executable: /bin/bash
      when: >
        pi_current.failed or
        (pi_current.stdout is defined and
         (pi_current.stdout | length > 0 and
         (pi_current.stdout | regex_replace('^v', '')) is version(pi_version_target, '<')))
      changed_when: true

    - name: Run pi update
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        pi update
      args:
        executable: /bin/bash
      register: pi_update_result
      changed_when: true
      ignore_errors: yes

    - name: Verify pi installation
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        pi --version 2>&1
      args:
        executable: /bin/bash
      register: pi_verify
      changed_when: false

    - name: Report pi status
      ansible.builtin.debug:
        msg: "✅ {{ inventory_hostname }} — pi {{ pi_verify.stdout | default(pi_verify.stderr, true) | trim }}, node {{ node_current.stdout | default('unknown') | trim }}"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 3: LVM Expansion + Ollama + Target Models — all lab nodes
# ══════════════════════════════════════════════════════════════════════════════

- name: PHASE 3 - LVM Expansion + Ollama + Models on Lab Nodes
  hosts: lab_nodes
  gather_facts: yes
  strategy: free

  vars:
    target_models:
      - "qwen3.5:4b"
      - "qwen3:8b"
      - "gemma4:e4b"

  tasks:
    # ── LVM Expansion ──────────────────────────────────────────
    - name: Check if ubuntu-vg exists
      ansible.builtin.shell: sudo vgs ubuntu-vg 2>/dev/null
      register: vg_check
      changed_when: false
      failed_when: false

    - name: Expand LVM to full disk (if ubuntu-vg exists)
      block:
        - name: Extend logical volume to 100% free space
          ansible.builtin.shell: sudo lvextend -l +100%FREE /dev/ubuntu-vg/ubuntu-lv
          register: lvextend_result
          changed_when: lvextend_result.rc == 0
          failed_when: false

        - name: Resize filesystem
          ansible.builtin.shell: sudo resize2fs /dev/ubuntu-vg/ubuntu-lv
          register: resize_result
          changed_when: resize_result.rc == 0
          failed_when: false

        - name: Verify LVM expansion
          ansible.builtin.shell: |
            lv_size=$(sudo lvs ubuntu-vg/ubuntu-lv --noheadings --units g -o lv_size | tr -d ' g')
            vg_size=$(sudo vgs ubuntu-vg --noheadings --units g -o vg_size | tr -d ' g')
            percent=$(awk "BEGIN {printf \"%.0f\", ($lv_size / $vg_size) * 100}")
            echo "LVM: ${lv_size}G / ${vg_size}G (${percent}%)"
          register: lvm_verify
          changed_when: false

        - name: Report LVM expansion
          ansible.builtin.debug:
            msg: "✅ {{ inventory_hostname }} — {{ lvm_verify.stdout }}"
      when: vg_check.rc == 0

    # ── Ollama Installation ────────────────────────────────────
    - name: Check if Ollama is installed
      ansible.builtin.command: ollama --version
      register: ollama_check
      changed_when: false
      ignore_errors: true

    - name: Install Ollama
      ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
      when: ollama_check.rc != 0
      changed_when: true

    - name: Ensure Ollama systemd service is running
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started
      when: ansible_service_mgr == 'systemd'
      ignore_errors: yes

    - name: Wait for Ollama API
      ansible.builtin.uri:
        url: http://localhost:11434/api/tags
        status_code: 200
      register: api_ready
      retries: 15
      delay: 5
      until: api_ready.status == 200

    - name: Pull target models
      ansible.builtin.command: ollama pull {{ item }}
      register: model_pull
      retries: 3
      delay: 30
      until: model_pull.rc == 0
      loop: "{{ target_models }}"

    - name: List installed models
      ansible.builtin.command: ollama list
      register: model_list
      changed_when: false

    - name: Report Ollama status
      ansible.builtin.debug:
        msg:
          - "✅ {{ inventory_hostname }} — Ollama ready"
          - "   Models: {{ model_list.stdout_lines | join(', ') }}"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 4: Extension Deploy — all lab nodes
# ══════════════════════════════════════════════════════════════════════════════

- name: PHASE 4 - coms-net Extension on Lab Nodes
  hosts: lab_nodes
  gather_facts: yes
  strategy: free

  vars:
    extension_src: "{{ playbook_dir }}/../"

  tasks:
    - name: Create extension directories
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/pi-cross-node-comms/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - src/skills/pi-cross-node-comms
        - server

    - name: Copy extension files
      ansible.builtin.copy:
        src: "{{ extension_src }}/{{ item }}"
        dest: "{{ ansible_env.HOME }}/pi-cross-node-comms/{{ item }}"
        mode: '0644'
      loop:
        - src/index.ts
        - src/heartbeat-tick.ts
        - src/themeMap.ts
        - src/skills/pi-cross-node-comms/SKILL.md
        - package.json

    - name: Install extension via pi
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        cd {{ ansible_env.HOME }}/pi-cross-node-comms
        pi install .
      args:
        executable: /bin/bash
      register: pi_install
      changed_when: "'Installed' in pi_install.stdout"

    - name: Report extension ready
      ansible.builtin.debug:
        msg: "✅ {{ inventory_hostname }} — extension installed"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 5: Start Agents — systemd service (replaces nohup)
# ══════════════════════════════════════════════════════════════════════════════
#
# Installs a systemd service template (pi-cross-node-agent@.service) that
# replaces the old nohup-based agent launch. Agents now survive crashes,
# hub restarts (SSE reconnect), and host reboots.
#
# The unit file is templated from ansible/systemd/pi-cross-node-agent@.service.template
# with values from ansible/systemd/pi-cross-node-agent.conf.
# ══════════════════════════════════════════════════════════════════════════════

- name: PHASE 5 - Install and Start Agent Services (systemd)
  hosts: lab_nodes
  gather_facts: yes
  strategy: free

  vars:
    hub_url: "http://192.168.0.142:8080"
    coms_token: "{{ (lookup('env', 'PI_COMS_NET_AUTH_TOKEN') | default('', true)) or '7e095b8e0b5d8bc44feea4da24e989fcf92b9341b5db8ed9604f05c412f386a0' }}"
    hub_project: "lab"
    extension_path: "{{ ansible_env.HOME }}/pi-cross-node-comms"
    systemd_src: "{{ playbook_dir }}/systemd"

  tasks:
    # ── Discover pi executable path ──
    - name: Find pi executable path
      ansible.builtin.shell: |
        export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        which pi
      args:
        executable: /bin/bash
      register: pi_which
      changed_when: false

    - name: Set pi_executable fact
      ansible.builtin.set_fact:
        pi_executable: "{{ pi_which.stdout | default('/usr/local/bin/pi') }}"

    # ── Stop any nohup-launched agent (migration path) ──
    - name: Kill any existing nohup agent on this node
      ansible.builtin.shell: |
        pkill -f "pi -e.*coms-net" 2>/dev/null || true
        pkill -f "pi.*--name.*{{ inventory_hostname }}" 2>/dev/null || true
        rm -f /tmp/pi-agent-{{ inventory_hostname }}.pid
        true
      changed_when: false
      failed_when: false

    # ── Stop any existing systemd service (for clean restart) ──
    - name: Stop existing systemd service if running
      ansible.builtin.systemd:
        name: "pi-cross-node-agent@{{ inventory_hostname }}"
        state: stopped
      ignore_errors: yes
      changed_when: false

    # ── Create systemd directory ──
    - name: Ensure systemd directory exists
      ansible.builtin.file:
        path: /etc/systemd/system
        state: directory
        mode: '0755'
      become: yes

    # ── Copy the FIFO wrapper script ──
    - name: Copy pi-agent-standalone.sh wrapper
      ansible.builtin.copy:
        src: "{{ systemd_src }}/pi-agent-standalone.sh"
        dest: "{{ extension_path }}/pi-agent-standalone.sh"
        mode: '0755'
      become: yes

    # ── Template and install the systemd unit ──
    - name: Install systemd unit from template
      ansible.builtin.template:
        src: "{{ systemd_src }}/pi-cross-node-agent@.service.template"
        dest: "/etc/systemd/system/pi-cross-node-agent@{{ inventory_hostname }}.service"
        mode: '0644'
      become: yes

    # ── Install the environment file (secure permissions) ──
    - name: Install per-node environment file
      ansible.builtin.template:
        src: "{{ systemd_src }}/pi-cross-node-agent.conf"
        dest: "/etc/pi-cross-node-agent@{{ inventory_hostname }}.conf"
        mode: '0600'
        owner: root
        group: root
      become: yes

    # ── Reload systemd and enable/start the service ──
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes
      become: yes

    - name: Enable and start pi-cross-node-agent service
      ansible.builtin.systemd:
        name: "pi-cross-node-agent@{{ inventory_hostname }}"
        enabled: yes
        state: started
      become: yes
      register: service_start

    # ── Wait for service to be running ──
    - name: Wait for agent service to be active
      ansible.builtin.systemd:
        name: "pi-cross-node-agent@{{ inventory_hostname }}"
      register: service_status
      until: service_status.status.ActiveState == 'active'
      retries: 5
      delay: 3

    - name: Verify pi process is running
      ansible.builtin.shell: |
        systemctl is-active pi-cross-node-agent@{{ inventory_hostname }}
      register: pi_running
      changed_when: false
      failed_when: false

    - name: Report agent service status
      ansible.builtin.debug:
        msg: >-
          {{ '🚀' if pi_running.stdout | trim == 'active' else '❌' }}
          {{ inventory_hostname }} —
          pi-cross-node-agent@{{ inventory_hostname }}
          {{ pi_running.stdout | trim }}

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 6: Fleet Validation + Prune Down Nodes
# ══════════════════════════════════════════════════════════════════════════════


# PHASE 6: Fleet Validation + Prune Down Nodes
# Uses curl instead of ansible.builtin.uri to avoid ssl dependency on macOS

- name: PHASE 6 - Fleet Validation + Prune Down Nodes
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    coms_token: "{{ (lookup('env', 'PI_COMS_NET_AUTH_TOKEN') | default('', true)) or '7e095b8e0b5d8bc44feea4da24e989fcf92b9341b5db8ed9604f05c412f386a0' }}"
    hub_url: "http://192.168.0.142:8080"

  tasks:
    - name: Wait for agents to register on hub
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          count=$(curl -sf -H "Authorization: Bearer {{ coms_token }}" "{{ hub_url }}/v1/agents?project=lab" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('agents',[])))" 2>/dev/null || echo 0)
          if [ "$count" -ge 1 ]; then
            echo "Agents registered: $count"
            exit 0
          fi
          sleep 3
        done
        echo "No agents registered after 90 seconds"
        exit 1
      register: agent_wait
      changed_when: false

    - name: Check which lab nodes are reachable via SSH
      ansible.builtin.shell: |
        for host in fnet1 fnet2 fnet3 fnet4 fnet5 fnet6 fnet7; do
          if ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$host" true 2>/dev/null; then
            echo "$host UP"
          else
            echo "$host DOWN"
          fi
        done
      register: ssh_checks
      changed_when: false
      failed_when: false

    - name: Build list of down node names
      ansible.builtin.set_fact:
        down_node_names: "{{ ssh_checks.stdout_lines | select('match', '.*DOWN') | map('regex_replace', ' DOWN$', '') | list }}"

    - name: Prune down nodes from hub
      ansible.builtin.shell: |
        for sid in $(curl -sf -H "Authorization: Bearer {{ coms_token }}" "{{ hub_url }}/v1/agents?project=lab" | python3 -c "
          import json, sys
          agents = json.load(sys.stdin).get('agents', [])
          down = {{ down_node_names | to_json }}
          for a in agents:
              if a['name'] in down:
                  print(a['session_id'])
        " 2>/dev/null); do
          curl -sf -X DELETE -H "Authorization: Bearer {{ coms_token }}" "{{ hub_url }}/v1/agents/${sid}?project=lab" 2>/dev/null || true
        done
      ignore_errors: yes

    - name: Get final agent list
      ansible.builtin.shell: |
        curl -sf -H "Authorization: Bearer {{ coms_token }}" "{{ hub_url }}/v1/agents?project=lab" | python3 -m json.tool 2>/dev/null || echo '{"agents":[]}'
      register: final_agents
      changed_when: false

    - name: Display fleet status
      ansible.builtin.debug:
        msg:
          - "============================================================="
          - "  FLEET STANDUP COMPLETE"
          - "  Hub:      {{ hub_url }}"
          - "  Project:  default"
          - "  Agents:   see output above"
          - ""
          - "  Down nodes pruned: {{ down_node_names | join(', ') | default('none') }}"
          - "============================================================="
