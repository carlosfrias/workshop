---
# Standup Fleet — Entry Point
#
# This playbook delegates to standup-fleet-chains.yml, which runs the
# phase playbooks concurrently as 3 chains for faster standup.
#
# DO NOT add phase logic here. Add it to the individual phase playbooks
# (phase0-nfs-mount.yml, phase1-hub-server.yml, etc.) and reference
# them in standup-fleet-chains.yml.
#
# The monolithic version is preserved in standup-fleet-monolith.yml
# for reference only — it is NOT the canonical fleet standup.
#
# Usage:
#   ansible-playbook -i inventory.yml standup-fleet.yml
#
# This is equivalent to:
#   ansible-playbook -i inventory.yml standup-fleet-chains.yml
#
# Env vars:
#   PI_COMS_NET_AUTH_TOKEN — auth token (default: shared lab token)

- name: STANDUP FLEET (delegates to chains orchestrator)
  import_playbook: standup-fleet-chains.yml
